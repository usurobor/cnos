name: oneoff release 3.82.4

# One-off: build + publish release 3.82.4 — dispatch-readiness release
# carrying the cnos#493 label-doctor engine (cn label-doctor, wired into
# `cn repo install --dispatch cds`). Direct tag pushes are blocked by tag
# protection and PAT-pushed tags don't trigger release.yml, so this builds
# the four platform binaries + package index inline, runs the Tier-1 kata
# gate against the shipped linux binary, publishes via action-gh-release
# (which creates the tag), then deletes itself.

on:
  push:
    paths:
      - '.github/workflows/oneoff-release-3824.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Cross-build platform binaries (pure stdlib, no cgo)
        working-directory: src/go
        run: |
          set -euo pipefail
          mkdir -p ../../dist
          build() {
            GOOS="$1" GOARCH="$2" go build \
              -ldflags "-X main.version=3.82.4" \
              -o "../../dist/cn-$3" ./cmd/cn
            chmod +x "../../dist/cn-$3"
          }
          build linux  amd64 linux-x64
          build linux  arm64 linux-arm64
          build darwin amd64 macos-x64
          build darwin arm64 macos-arm64
          ls -la ../../dist

      - name: Configure git identity (kata doctor needs one)
        run: |
          git config --global user.name "release-ci"
          git config --global user.email "release-ci@cnos.local"

      - name: Tier-1 kata gate (shipped linux binary)
        # Prove the packaged binary works end to end before publishing — same
        # gate release.yml runs. If kata fails, the release is not published.
        run: |
          set -euo pipefail
          cp dist/cn-linux-x64 cn
          export PATH="$PWD:$PATH"
          scripts/kata/run-all.sh

      - name: Generate binary checksums
        run: |
          set -euo pipefail
          cd dist
          : > checksums.txt
          for bin in cn-*; do
            sha256sum "$bin" >> checksums.txt
          done
          cat checksums.txt

      - name: Build package tarballs and index
        run: |
          set -euo pipefail
          cd src/go && go build -o ../../cn ./cmd/cn && cd ../..
          ./cn build
          ls -la dist/packages/

      - name: Publish release 3.82.4
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 3.82.4
          name: 3.82.4
          target_commitish: main
          files: |
            dist/cn-linux-x64
            dist/cn-linux-arm64
            dist/cn-macos-x64
            dist/cn-macos-arm64
            dist/checksums.txt
            dist/packages/*.tar.gz
            dist/packages/index.json
          generate_release_notes: true

      - name: Self-delete this one-off workflow
        run: |
          set -euo pipefail
          git config user.name "release-ci"
          git config user.email "release-ci@cnos.local"
          git rm .github/workflows/oneoff-release-3824.yml
          git commit -m "chore: self-delete one-off release-3.82.4 workflow"
          git push origin HEAD:main
