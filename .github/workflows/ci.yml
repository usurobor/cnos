name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/go/go.sum

      - name: Build
        working-directory: src/go
        run: go build ./...

      - name: Build binary
        working-directory: src/go
        run: go build -o cn ./cmd/cn

      - name: Test
        working-directory: src/go
        run: go test ./... -v

      - name: Vet
        working-directory: src/go
        run: go vet ./...

      - name: Dispatch boundary check (INVARIANTS.md T-002)
        working-directory: src/go
        run: |
          VIOLATIONS=""
          for f in internal/cli/cmd_*.go; do
            [ -f "$f" ] || continue
            case "$f" in *_test.go) continue;; esac
            if grep -qE "^\s*\"(os|net/http|encoding/json|archive/|compress/|crypto/|path/filepath)\"" "$f"; then
              VIOLATIONS="$VIOLATIONS\n  $f"
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Dispatch boundary violation (INVARIANTS.md T-002, eng/go §2.18)"
            echo -e "   Violations:$VIOLATIONS"
            exit 1
          fi
          echo "✓ Dispatch boundary: all cmd_*.go files are thin wrappers"

      - name: Smoke test
        working-directory: src/go
        run: |
          ./cn help

  kata-tier1:
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/go/go.sum

      - name: Build binary
        working-directory: src/go
        run: go build -o ../../cn ./cmd/cn

      - name: Configure git identity
        # `cn doctor` checks git user.name / user.email. GitHub runners
        # have no default identity — set one so the Tier 1 doctor kata
        # sees a clean config.
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@cnos.local"

      - name: Run Tier 1 kata
        run: |
          export PATH="$PWD:$PATH"
          scripts/kata/run-all.sh

  kata-tier2:
    runs-on: ubuntu-latest
    needs: [kata-tier1]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/go/go.sum

      - name: Build binary
        working-directory: src/go
        run: go build -o ../../cn ./cmd/cn

      - name: Configure git identity
        # Tier 2 creates hubs via `cn init`; several sub-kata exercise
        # `cn doctor`, which requires a git user.name / user.email.
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@cnos.local"

      - name: Build packages
        run: |
          export PATH="$PWD:$PATH"
          cn build

      - name: Set up CI test hub (cnos.core + cnos.kata installed)
        run: |
          export PATH="$PWD:$PATH"
          mkdir -p ci-tier2
          cd ci-tier2
          cn init ci-hub >/dev/null
          cd cn-ci-hub
          cn setup >/dev/null
          cat > .cn/deps.json <<'JSON'
          {
            "schema": "cn.deps.v1",
            "profile": "engineer",
            "packages": {
              "cnos.core": "3.54.0",
              "cnos.kata": "0.2.0"
            }
          }
          JSON
          cn deps lock
          cn deps restore

      - name: Run Tier 2 kata
        run: |
          export PATH="$PWD:$PATH"
          cd ci-tier2/cn-ci-hub
          cn kata-run --class runtime

  notify:
    needs: [go, kata-tier1, kata-tier2]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          STATUS="${{ needs.go.result }}"
          K1="${{ needs.kata-tier1.result }}"
          K2="${{ needs.kata-tier2.result }}"
          if [ "$STATUS" = "success" ] && [ "$K1" = "success" ] && [ "$K2" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
            STATUS="$STATUS (kata1: $K1, kata2: $K2)"
          fi
          REF="${{ github.head_ref || github.ref_name }}"
          MSG="$ICON CI $STATUS: ${{ github.repository }}@${REF}"
          [ -n "${{ github.event.pull_request.number }}" ] && MSG="$MSG (PR #${{ github.event.pull_request.number }})"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" -d text="${MSG}" -d disable_notification=true
