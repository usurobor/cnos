name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.x

      - name: Install dependencies
        run: |
          opam install dune ppx_expect ppxlib mdx --yes
        env:
          OPAMRETRIES: "3"

      - name: Build native binary
        run: |
          eval $(opam env)
          dune build src/cli/cn.exe

      - name: Run tests (cram + unit)
        run: |
          eval $(opam env)
          mkdir -p "$TMPDIR"
          dune runtest -j 1
        env:
          # Isolate temp files per CI run — ppx_expect's internal
          # dune_*_stderr capture files race under parallel execution
          # on GHA runners. Combined with -j 1 to serialize tests.
          TMPDIR: ${{ runner.temp }}/dune-tests

      - name: Smoke test
        run: |
          eval $(opam env)
          ./_build/default/src/cli/cn.exe --version
          ./_build/default/src/cli/cn.exe --help

  notify:
    needs: [ocaml]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          STATUS="${{ needs.ocaml.result }}"
          ICON="✅"; [ "$STATUS" != "success" ] && ICON="❌"
          REF="${{ github.head_ref || github.ref_name }}"
          MSG="$ICON CI $STATUS: ${{ github.repository }}@${REF}"
          [ -n "${{ github.event.pull_request.number }}" ] && MSG="$MSG (PR #${{ github.event.pull_request.number }})"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" -d text="${MSG}" -d disable_notification=true
