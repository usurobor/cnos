name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/go/go.sum

      - name: Build
        working-directory: src/go
        run: go build ./...

      - name: Build binary
        working-directory: src/go
        run: go build -o cn ./cmd/cn

      - name: Test
        working-directory: src/go
        run: go test ./... -v

      - name: Vet
        working-directory: src/go
        run: go vet ./...

      - name: Dispatch boundary check (INVARIANTS.md T-002)
        working-directory: src/go
        run: |
          VIOLATIONS=""
          for f in internal/cli/cmd_*.go; do
            [ -f "$f" ] || continue
            case "$f" in *_test.go) continue;; esac
            if grep -qE "^\s*\"(os|net/http|encoding/json|archive/|compress/|crypto/|path/filepath)\"" "$f"; then
              VIOLATIONS="$VIOLATIONS\n  $f"
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Dispatch boundary violation (INVARIANTS.md T-002, eng/go §2.18)"
            echo -e "   Violations:$VIOLATIONS"
            exit 1
          fi
          echo "✓ Dispatch boundary: all cmd_*.go files are thin wrappers"

      - name: Smoke test
        working-directory: src/go
        run: |
          ./cn help

  notify:
    needs: [go]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          STATUS="${{ needs.go.result }}"
          ICON="✅"; [ "$STATUS" != "success" ] && ICON="❌"
          REF="${{ github.head_ref || github.ref_name }}"
          MSG="$ICON CI $STATUS: ${{ github.repository }}@${REF}"
          [ -n "${{ github.event.pull_request.number }}" ] && MSG="$MSG (PR #${{ github.event.pull_request.number }})"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" -d text="${MSG}" -d disable_notification=true
