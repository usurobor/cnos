name: One-shot — republish 3.82.0 GH release notes

# Third use of remote-runner-delegation doctrine per
# docs/gamma/essays/BOX-AND-THE-RUNNER.md and
# cnos.cdd/skills/cdd/delta/SKILL.md §8 "Remote-runner delegation".
# Receipt: .cdd/unreleased/427/remote-runner-receipt-republish-3.82.0-notes.md
# Issue:   https://github.com/usurobor/cnos/issues/427
#
# Motivation: the v3.82.0 GH release (published via cnos#426's one-shot)
# carries the verbose 109-line RELEASE.md body. cnos#427 rewrites the
# release notes under cnos.core/skills/write/SKILL.md discipline; the
# new ~45-line tight version lands on main as root RELEASE.md and at
# .cdd/releases/3.82.0/RELEASE.md, and the CHANGELOG 3.82.0 row is
# tightened to 4 bullets. This workflow updates the GH release body
# (PATCH-mode via softprops/action-gh-release@v1) so the GH-facing
# release notes match the in-repo canonical body. The tag itself
# (fd1d654e, set by cnos#425) is NOT touched; binaries (none, per
# cnos#426 cdd-iteration F1) are NOT touched.
#
# Per delta/SKILL.md §8.3 the workflow self-deletes after the work
# completes; per §8.2 the receipt is authored in the same commit-set
# as the workflow.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/republish-3.82.0-notes.yml'

permissions:
  contents: write

jobs:
  republish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify root RELEASE.md is new tight version
        run: |
          head -1 RELEASE.md
          grep -q "^# 3.82.0$" RELEASE.md || (echo "ERROR: RELEASE.md not the new version" && exit 1)
          LINES=$(wc -l < RELEASE.md)
          [ "$LINES" -le 90 ] || (echo "ERROR: RELEASE.md is $LINES lines (>90)" && exit 1)
      - name: Update GitHub Release body
        uses: softprops/action-gh-release@v1
        with:
          tag_name: '3.82.0'
          name: '3.82.0'
          body_path: RELEASE.md
          draft: false
          prerelease: false
      - name: Self-delete the workflow file
        run: |
          git config user.name "cnos-remote-runner[bot]"
          git config user.email "cnos-remote-runner@cnos.local"
          git fetch origin main
          git checkout main
          git rm .github/workflows/republish-3.82.0-notes.yml
          git commit -m "release: remove one-shot republish-3.82.0-notes workflow (cnos#427)"
          git push origin main
