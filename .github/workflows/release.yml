name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v*'
  workflow_dispatch:
    inputs:
      smoke-only:
        description: "Run smoke test only (skip build+publish)"
        required: false
        type: boolean
        default: true
      tag:
        description: >-
          Tag to publish/smoke-test (default: triggering tag/ref). For a
          tooling-channel publish (cnos#618 AC1/AC3), pass an explicit tag
          such as tooling-20260709-937f275 — action-gh-release otherwise
          targets github.ref, which for workflow_dispatch is a branch, not
          a tag.
        required: false
        type: string
      prerelease:
        description: >-
          Publish as a GitHub prerelease (tooling channel, cnos#618 AC1).
          Prereleases are excluded from the /releases/latest redirect, so
          this input never changes install.sh's default resolution.
        required: false
        type: boolean
        default: false

jobs:
  build:
    if: ${{ !inputs.smoke-only }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            goos: linux
            goarch: amd64
            native: true
          - os: ubuntu-24.04-arm
            target: linux-arm64
            goos: linux
            goarch: arm64
            native: true
          - os: macos-14
            target: macos-arm64
            goos: darwin
            goarch: arm64
            native: true
          # macos-latest is now Apple Silicon (arm64), so a native build
          # there produces an arm64 binary mislabeled "x64" (cnos#429 F3).
          # Cross-compile the Intel (amd64) binary on the arm64 runner
          # instead — cn is pure-stdlib with no cgo, so cross-compilation
          # is safe. The amd64 binary cannot execute on the arm64 runner,
          # so its native test + Tier-1 kata are skipped (native: false).
          - os: macos-14
            target: macos-x64
            goos: darwin
            goarch: amd64
            native: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # cnos#618 AC4: the historical tag-push auth failure (run
          # 26340314834, tag 3.82.0, "could not read Username for
          # 'https://github.com'") happened inside a raw commit-SHA fetch
          # (`git fetch ... +<sha>:refs/tags/<tag>`) — the shape
          # actions/checkout emits by default for a tag-triggered ref when
          # fetch-tags is left false. fetch-tags: true makes checkout
          # fetch the tag by ref instead of by bare SHA, avoiding that
          # code path. persist-credentials/token are pinned explicitly
          # (matching the action's own defaults) so this job's auth setup
          # can't be silently changed by an upstream default or an
          # org-level override — see self-coherence.md for the full RCA,
          # including why cnos#429 already ruled out a permissions-scope
          # cause.
          fetch-tags: true
          persist-credentials: true
          token: ${{ github.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Build binary
        # Stamp the release tag into the binary so `cn setup` writes a
        # default deps.json pinning packages to the matching version
        # (issue #230 AC3 — release-bootstrap smoke). Without -ldflags
        # the binary's compile-time `version` stays "dev", which `cn
        # setup` then writes into deps.json, breaking `cn deps lock`
        # against the released package index.
        #
        # cnos#618 AC3: for a workflow_dispatch run, github.ref_name is
        # the dispatched *branch* (e.g. "main"), not the tag this run
        # publishes to — prefer the explicit tag input when set so the
        # stamped version matches the tag the binary actually ships
        # under.
        working-directory: src/go
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION:-${{ github.ref_name }}}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X main.version=${VERSION}" \
            -o cn ./cmd/cn

      - name: Test
        # Native legs only — the cross-compiled amd64 binary cannot run
        # on the arm64 runner. Logic is covered by the same-arch (linux-x64)
        # and same-OS (macos-arm64) legs.
        if: matrix.native
        working-directory: src/go
        run: go test ./... -v

      - name: Package binary
        run: |
          mkdir -p dist
          cp src/go/cn dist/cn-${{ matrix.target }}
          chmod +x dist/cn-${{ matrix.target }}

      - name: Configure git identity
        run: |
          git config --global user.name "release-ci"
          git config --global user.email "release-ci@cnos.local"

      - name: Run Tier 1 verification (shipped binary)
        # Prove the packaged binary works end-to-end before uploading.
        # If any check fails, the matrix position fails, the `publish`
        # job's `needs: build` gate fails, and no artifacts are published.
        # Native legs only — skipped for the cross-compiled macos-x64
        # binary, which cannot execute on the arm64 runner.
        if: matrix.native
        run: |
          cp dist/cn-${{ matrix.target }} cn
          export PATH="$PWD:$PATH"
          scripts/kata/run-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cn-${{ matrix.target }}
          path: dist/cn-${{ matrix.target }}

  publish:
    needs: build
    if: ${{ !inputs.smoke-only }}
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true
          token: ${{ github.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate binary checksums
        run: |
          cd artifacts
          for dir in cn-*; do
            [ -d "$dir" ] || continue
            for bin in "$dir"/cn-*; do
              [ -f "$bin" ] || continue
              sha256sum "$bin" | sed "s|$dir/||" >> checksums.txt
            done
          done
          cat checksums.txt

      - name: Build package tarballs and index
        run: |
          cd src/go && go build -o ../../cn ./cmd/cn && cd ../..
          ./cn build
          mkdir -p artifacts/packages
          cp dist/packages/*.tar.gz artifacts/packages/ 2>/dev/null || true
          cp dist/packages/index.json artifacts/packages/ 2>/dev/null || true
          cp dist/packages/checksums.txt artifacts/packages/ 2>/dev/null || true
          ls -la artifacts/packages/ 2>/dev/null || echo "No packages built (src/packages/ may not exist yet)"

      - name: Check for release notes
        id: notes
        run: |
          if [ -f RELEASE.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (with notes)
        if: steps.notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v1
        with:
          # cnos#618 AC3: pass the dispatched tag explicitly so this
          # targets that tag instead of github.ref (a branch for
          # workflow_dispatch runs). Empty string on a real tag-push
          # falls back to the pushed tag (action-gh-release's own
          # `input_tag_name || derive-from-ref` fallback), so tag-push
          # behavior is unchanged.
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            artifacts/*/cn-*
            artifacts/checksums.txt
            artifacts/packages/*.tar.gz
            artifacts/packages/index.json
          body_path: RELEASE.md

      - name: Create release (auto-generated)
        if: steps.notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            artifacts/*/cn-*
            artifacts/checksums.txt
            artifacts/packages/*.tar.gz
            artifacts/packages/index.json
          generate_release_notes: true

  smoke:
    needs: publish
    if: ${{ always() && (needs.publish.result == 'success' || inputs.smoke-only) }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-14
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release bootstrap smoke
        # Downloads shipped binary + index + tarballs from the GitHub
        # release URL (same way an operator would) and verifies the
        # bootstrap chain works. Exit 0=ok, 1=broken, 2=skipped.
        run: |
          set +e
          scripts/smoke/90-release-bootstrap.sh "${{ steps.tag.outputs.tag }}"
          rc=$?
          set -e
          case "$rc" in
            0) echo "::notice::release-smoke ok on ${{ matrix.target }}" ;;
            2) echo "::warning::release-smoke skipped on ${{ matrix.target }} (rc=2)" ;;
            *) echo "::error::release-smoke FAILED on ${{ matrix.target }} (rc=$rc)"; exit "$rc" ;;
          esac
