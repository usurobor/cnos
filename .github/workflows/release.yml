name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-14
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/go/go.sum

      - name: Build binary
        working-directory: src/go
        run: go build -o cn ./cmd/cn

      - name: Test
        working-directory: src/go
        run: go test ./... -v

      - name: Package binary
        run: |
          mkdir -p dist
          cp src/go/cn dist/cn-${{ matrix.target }}
          chmod +x dist/cn-${{ matrix.target }}

      - name: Configure git identity
        # `cn doctor` (kata 04) checks git user.name / user.email.
        # GitHub runners have no default identity — set one so the
        # Tier 1 doctor kata sees a clean config.
        run: |
          git config --global user.name "release-ci"
          git config --global user.email "release-ci@cnos.local"

      - name: Run Tier 1 kata (shipped binary)
        # Prove the packaged binary — the one being shipped — works
        # end-to-end (help → init → status → doctor → build → install)
        # on this platform before uploading. If any kata fails here,
        # the matrix position fails, the `release` job's `needs: build`
        # gate fails, and no artifacts are published.
        run: |
          cp dist/cn-${{ matrix.target }} cn
          export PATH="$PWD:$PATH"
          scripts/kata/run-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cn-${{ matrix.target }}
          path: dist/cn-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/go/go.sum

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate binary checksums
        run: |
          cd artifacts
          for dir in cn-*; do
            [ -d "$dir" ] || continue
            for bin in "$dir"/cn-*; do
              [ -f "$bin" ] || continue
              sha256sum "$bin" | sed "s|$dir/||" >> checksums.txt
            done
          done
          cat checksums.txt

      - name: Build package tarballs and index
        run: |
          cd src/go && go build -o ../../cn ./cmd/cn && cd ../..
          ./cn build
          mkdir -p artifacts/packages
          cp dist/packages/*.tar.gz artifacts/packages/ 2>/dev/null || true
          cp dist/packages/index.json artifacts/packages/ 2>/dev/null || true
          cp dist/packages/checksums.txt artifacts/packages/ 2>/dev/null || true
          ls -la artifacts/packages/ 2>/dev/null || echo "No packages built (src/packages/ may not exist yet)"

      - name: Check for release notes
        id: notes
        run: |
          if [ -f RELEASE.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (with notes)
        if: steps.notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/cn-*
            artifacts/checksums.txt
            artifacts/packages/*.tar.gz
            artifacts/packages/index.json
          body_path: RELEASE.md

      - name: Create release (auto-generated)
        if: steps.notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/cn-*
            artifacts/checksums.txt
            artifacts/packages/*.tar.gz
            artifacts/packages/index.json
          generate_release_notes: true

      - name: Telegram notification
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          ICON="✅"; [ "$STATUS" != "success" ] && ICON="❌"
          MSG="$ICON Release $STATUS: ${{ github.repository }}@${{ github.ref_name }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" -d text="${MSG}" -d disable_notification=true
