name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v*'
  workflow_dispatch:
    inputs:
      smoke-only:
        description: "Run smoke test only (skip build+publish)"
        required: false
        type: boolean
        default: true
      tag:
        description: "Release tag to smoke-test (default: triggering tag)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    if: ${{ !inputs.smoke-only }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-14
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Build binary
        # Stamp the release tag into the binary so `cn setup` writes a
        # default deps.json pinning packages to the matching version
        # (issue #230 AC3 — release-bootstrap smoke). Without -ldflags
        # the binary's compile-time `version` stays "dev", which `cn
        # setup` then writes into deps.json, breaking `cn deps lock`
        # against the released package index.
        working-directory: src/go
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }}" \
            -o cn ./cmd/cn

      - name: Test
        working-directory: src/go
        run: go test ./... -v

      - name: Package binary
        run: |
          mkdir -p dist
          cp src/go/cn dist/cn-${{ matrix.target }}
          chmod +x dist/cn-${{ matrix.target }}

      - name: Configure git identity
        run: |
          git config --global user.name "release-ci"
          git config --global user.email "release-ci@cnos.local"

      - name: Run Tier 1 verification (shipped binary)
        # Prove the packaged binary works end-to-end before uploading.
        # If any check fails, the matrix position fails, the `publish`
        # job's `needs: build` gate fails, and no artifacts are published.
        run: |
          cp dist/cn-${{ matrix.target }} cn
          export PATH="$PWD:$PATH"
          scripts/kata/run-all.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cn-${{ matrix.target }}
          path: dist/cn-${{ matrix.target }}

  publish:
    needs: build
    if: ${{ !inputs.smoke-only }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate binary checksums
        run: |
          cd artifacts
          for dir in cn-*; do
            [ -d "$dir" ] || continue
            for bin in "$dir"/cn-*; do
              [ -f "$bin" ] || continue
              sha256sum "$bin" | sed "s|$dir/||" >> checksums.txt
            done
          done
          cat checksums.txt

      - name: Build package tarballs and index
        run: |
          cd src/go && go build -o ../../cn ./cmd/cn && cd ../..
          ./cn build
          mkdir -p artifacts/packages
          cp dist/packages/*.tar.gz artifacts/packages/ 2>/dev/null || true
          cp dist/packages/index.json artifacts/packages/ 2>/dev/null || true
          cp dist/packages/checksums.txt artifacts/packages/ 2>/dev/null || true
          ls -la artifacts/packages/ 2>/dev/null || echo "No packages built (src/packages/ may not exist yet)"

      - name: Check for release notes
        id: notes
        run: |
          if [ -f RELEASE.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (with notes)
        if: steps.notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/cn-*
            artifacts/checksums.txt
            artifacts/packages/*.tar.gz
            artifacts/packages/index.json
          body_path: RELEASE.md

      - name: Create release (auto-generated)
        if: steps.notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/cn-*
            artifacts/checksums.txt
            artifacts/packages/*.tar.gz
            artifacts/packages/index.json
          generate_release_notes: true

  smoke:
    needs: publish
    if: ${{ always() && (needs.publish.result == 'success' || inputs.smoke-only) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-14
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release bootstrap smoke
        # Downloads shipped binary + index + tarballs from the GitHub
        # release URL (same way an operator would) and verifies the
        # bootstrap chain works. Exit 0=ok, 1=broken, 2=skipped.
        run: |
          set +e
          scripts/smoke/90-release-bootstrap.sh "${{ steps.tag.outputs.tag }}"
          rc=$?
          set -e
          case "$rc" in
            0) echo "::notice::release-smoke ok on ${{ matrix.target }}" ;;
            2) echo "::warning::release-smoke skipped on ${{ matrix.target }} (rc=2)" ;;
            *) echo "::error::release-smoke FAILED on ${{ matrix.target }} (rc=$rc)"; exit "$rc" ;;
          esac

  notify:
    needs: [build, publish, smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          FAILED=false
          RESULTS=""
          for pair in \
            "build:${{ needs.build.result }}" \
            "publish:${{ needs.publish.result }}" \
            "smoke:${{ needs.smoke.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              FAILED=true
              RESULTS="$RESULTS $name:$result"
            fi
          done
          if [ "$FAILED" = "true" ]; then
            ICON="❌"
            STATUS="failure —$RESULTS"
          else
            ICON="✅"
            STATUS="success"
          fi
          TAG="${{ github.ref_name }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          TAG_LINK="[${TAG}](${REPO_URL}/releases/tag/${TAG})"
          MSG="$ICON Release $STATUS: ${{ github.repository }}@${TAG_LINK}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" -d text="${MSG}" -d parse_mode=Markdown -d disable_notification=true
