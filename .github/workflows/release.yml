name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-x64
          - os: macos-14
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.x

      - name: Install dependencies
        run: opam install dune ppx_expect ppxlib mdx --yes

      - name: Build native binary
        run: |
          eval $(opam env)
          dune build src/cli/cn.exe

      - name: Run tests
        run: |
          eval $(opam env)
          mkdir -p "$TMPDIR"
          dune runtest -j 1
        env:
          TMPDIR: ${{ runner.temp }}/dune-tests

      - name: Package binary
        run: |
          mkdir -p dist
          cp _build/default/src/cli/cn.exe dist/cn-${{ matrix.target }}
          chmod +x dist/cn-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cn-${{ matrix.target }}
          path: dist/cn-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Check for release notes
        id: notes
        run: |
          if [ -f RELEASE.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (with notes)
        if: steps.notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/cn-*
          body_path: RELEASE.md

      - name: Create release (auto-generated)
        if: steps.notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/cn-*
          generate_release_notes: true
