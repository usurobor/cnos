name: zz-delete-stale-branch

# One-off operational helper: delete the stale cycle/524 branch (cnos#524 W4
# RCA action A1). The git proxy in the dev environment silently drops ref
# deletions and the MCP integration has no branch-delete, so this self-triggers
# on push (scoped to its own path so Sigma heartbeats don't fire it) and uses
# the runner GITHUB_TOKEN with contents:write. It deletes the ref, then removes
# itself so it cannot re-run.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/zz-delete-stale-branch.yml

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete stale cycle/524 (its history is already in main via #529)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Deleting refs/heads/cycle/524"
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/cycle/524" && echo "deleted" || echo "delete returned non-zero (may already be gone)"

      - name: Self-delete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "ci"
          git config user.email "ci@cnos.local"
          git rm .github/workflows/zz-delete-stale-branch.yml
          git commit -m "ops: remove one-off stale-branch-delete helper (self-cleanup)"
          git push origin HEAD:main || true
