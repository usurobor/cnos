name: oneoff release 3.82.3

# One-off: build + publish release 3.82.3 (carries the cn repo install
# resolver fix — resolve package versions from the release index, not the
# release tag). Direct tag pushes are blocked by tag protection and
# PAT-pushed tags don't trigger release.yml, so this workflow builds the
# four platform binaries + package index inline and publishes via
# action-gh-release (which creates the tag server-side), then deletes
# itself.

on:
  push:
    paths:
      - '.github/workflows/oneoff-release-3823.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Cross-build platform binaries (pure stdlib, no cgo)
        working-directory: src/go
        run: |
          set -euo pipefail
          mkdir -p ../../dist
          build() {
            GOOS="$1" GOARCH="$2" go build \
              -ldflags "-X main.version=3.82.3" \
              -o "../../dist/cn-$3" ./cmd/cn
            chmod +x "../../dist/cn-$3"
          }
          build linux  amd64 linux-x64
          build linux  arm64 linux-arm64
          build darwin amd64 macos-x64
          build darwin arm64 macos-arm64
          ls -la ../../dist

      - name: Generate binary checksums
        run: |
          set -euo pipefail
          cd dist
          : > checksums.txt
          for bin in cn-*; do
            sha256sum "$bin" >> checksums.txt
          done
          cat checksums.txt

      - name: Build package tarballs and index
        run: |
          set -euo pipefail
          cd src/go && go build -o ../../cn ./cmd/cn && cd ../..
          ./cn build
          ls -la dist/packages/

      - name: Publish release 3.82.3
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 3.82.3
          name: 3.82.3
          target_commitish: main
          files: |
            dist/cn-linux-x64
            dist/cn-linux-arm64
            dist/cn-macos-x64
            dist/cn-macos-arm64
            dist/checksums.txt
            dist/packages/*.tar.gz
            dist/packages/index.json
          generate_release_notes: true

      - name: Self-delete this one-off workflow
        run: |
          set -euo pipefail
          git config user.name "release-ci"
          git config user.email "release-ci@cnos.local"
          git rm .github/workflows/oneoff-release-3823.yml
          git commit -m "chore: self-delete one-off release-3.82.3 workflow"
          git push origin HEAD:main
