# One-shot remote-runner workflow — publish the 3.82.0 GH release.
#
# Doctrine: docs/gamma/essays/BOX-AND-THE-RUNNER.md
# Skill:    src/packages/cnos.cdd/skills/cdd/delta/SKILL.md §8 (Remote-runner delegation)
# Receipt:  .cdd/unreleased/426/remote-runner-receipt-publish-3.82.0.md
# Issue:    https://github.com/usurobor/cnos/issues/426
#
# Second use of the remote-runner-delegation primitive landed in cnos#425.
# Sidesteps .github/workflows/release.yml whose `build` job is broken on
# tag-push runs (git-auth failure inside the build matrix; cnos#426 F1).
# Tag force-push from cnos#425 successfully moved 3.82.0 to fd1d654e but
# did NOT retrigger release.yml (GH Actions `on.push.tags` does not fire
# reliably on tag force-update; cnos#426 F2). This workflow publishes the
# GH release directly via softprops/action-gh-release@v1, mirroring the
# pattern release.yml already uses in its `publish` job.
#
# Purpose: check out the repository AT TAG 3.82.0 (commit fd1d654e — the
# canonical v3.82.0 baseline; main HEAD has CELL-OF-CELLS + BOX-AND-THE-RUNNER
# content that landed post-tag and is NOT the correct body source), verify
# the root RELEASE.md is the v3.82.0 body, then create the GH release using
# softprops/action-gh-release@v1 with tag_name=3.82.0 and body_path=RELEASE.md.
# After the release is created, this workflow self-deletes by removing its
# own file in the final step, per §8.3 of delta/SKILL.md (one-shot workflows
# self-delete so the latent-execution authority closes after the run).
#
# Pure release-notes publication. No binary artifacts attached — the broken
# release.yml `build` matrix is a separate fix-cycle (filed as cnos#426 F1
# in cdd-iteration.md, disposition next-MCA). Binaries can be post-attached
# via a follow-on one-shot once release.yml `build` is repaired.
#
# Authority: GITHUB_TOKEN with contents: write — scoped to usurobor/cnos.
# Trigger:   push to main on this workflow's own path (so it fires only
#            when the cycle/426 merge lands, by which point the doctrine
#            and receipt are also on main per §8.2 authoring-order rule).
# Acceptor:  Operator inspects https://github.com/usurobor/cnos/releases/tag/3.82.0;
#            body must match .cdd/releases/3.82.0/RELEASE.md (mirrored at
#            root RELEASE.md on the v3.82.0 tag commit fd1d654e).

name: One-shot — publish 3.82.0 GH release

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-3.82.0-release.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: '3.82.0'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify root RELEASE.md is v3.82.0
        run: |
          head -1 RELEASE.md
          grep -q '^# v3.82.0' RELEASE.md || { echo "ERROR: RELEASE.md is not v3.82.0"; exit 1; }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: '3.82.0'
          name: '3.82.0 — CCNF package-architecture baseline'
          body_path: RELEASE.md
          draft: false
          prerelease: false

      - name: Self-delete the workflow file
        run: |
          git fetch origin main
          git checkout main
          git config user.name "cnos-remote-runner[bot]"
          git config user.email "cnos-remote-runner@cnos.local"
          git rm .github/workflows/publish-3.82.0-release.yml
          git commit -m "release: remove one-shot publish-3.82.0-release workflow (cnos#426)"
          git push origin main
