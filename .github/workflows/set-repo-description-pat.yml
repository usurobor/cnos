# One-shot remote-runner workflow — set the GitHub repo description (PAT).
#
# Doctrine: docs/gamma/essays/BOX-AND-THE-RUNNER.md
# Skill:    src/packages/cnos.cdd/skills/cdd/delta/SKILL.md §8
#
# GITHUB_TOKEN cannot mutate repo settings (cnos#430 attempt: 403). The
# operator created a fine-grained PAT with Administration: write, scoped to
# usurobor/cnos, and stored it as the ADMIN_PAT Actions secret. This run
# PATCHes the repo description with ADMIN_PAT, verifies it, then self-deletes
# its own file (the self-delete push uses GITHUB_TOKEN, which holds the
# contents:write the PAT deliberately lacks).
#
# Trigger:   push to main on this workflow's own path.
# Authority: ADMIN_PAT (Administration: write) for the PATCH; GITHUB_TOKEN
#            (contents: write) for the self-delete commit.
# Acceptor:  Operator confirms the "About" line on the repo home page.

name: One-shot — set repo description (PAT)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/set-repo-description-pat.yml'

permissions:
  contents: write

jobs:
  set-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set repository description
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          set -euo pipefail
          [ -n "${GH_TOKEN:-}" ] || { echo "FAIL: ADMIN_PAT secret is empty/unset"; exit 1; }
          DESC="Coherence Network OS — Git-native protocol/runtime for receipt-bearing human+AI work along a path of decreasing incoherence."
          gh api -X PATCH repos/usurobor/cnos -f description="$DESC"
          echo "--- verify ---"
          got=$(gh api repos/usurobor/cnos --jq '.description')
          echo "description now: $got"
          [ "$got" = "$DESC" ] || { echo "FAIL: description did not update"; exit 1; }

      - name: Self-delete this workflow
        run: |
          git config user.name "cnos-remote-runner[bot]"
          git config user.email "cnos-remote-runner@cnos.local"
          git rm .github/workflows/set-repo-description-pat.yml
          git commit -m "chore: remove one-shot set-repo-description-pat workflow"
          git push origin main
