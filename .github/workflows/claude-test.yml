# Test harness for anthropics/claude-code-action — verifies OAuth-token-based
# auth in a GH Actions context and confirms the action can read the repo and
# produce a minimal model-generated output.
#
# Trigger: opening an issue whose title contains "claude-test". The action's
# v1.0 does not yet support workflow_dispatch (per docs/custom-automations.md
# "coming soon"); the issues-event path is what works today and matches the
# cnos#432 wake-trigger pattern.
#
# Authority: CLAUDE_CODE_OAUTH_TOKEN (operator's Claude Pro/Max subscription
# token, generated via `claude setup-token`, stored as a repo secret).
#
# Pre-cnos#434 / cnos#432 / cnos#431 substrate test — not the deployed wake.

name: claude-test

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    if: contains(github.event.issue.title, 'claude-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read the project README.md.
            Write a single concise paragraph (3-5 sentences) summarizing
            what cnos is. Post your summary as a comment on this issue.
