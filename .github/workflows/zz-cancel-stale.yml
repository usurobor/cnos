name: zz-cancel-stale

# One-off operational helper: cancel specific in-flight/queued workflow runs.
# The MCP GitHub integration cannot cancel or workflow_dispatch (403), so this
# self-triggers on push (scoped to its own path so Sigma heartbeats don't fire
# it) and uses the runner GITHUB_TOKEN with an explicit actions:write grant.
# It cancels the listed runs, then deletes itself so it cannot re-run.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/zz-cancel-stale.yml

permissions:
  actions: write
  contents: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cancel stale runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for id in 28422594325 28423113625; do
            echo "Cancelling run $id"
            gh api -X POST "repos/${{ github.repository }}/actions/runs/$id/cancel" || true
          done

      - name: Self-delete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "ci"
          git config user.email "ci@cnos.local"
          git rm .github/workflows/zz-cancel-stale.yml
          git commit -m "ops: remove one-off cancel helper (self-cleanup)"
          git push origin HEAD:main || true
