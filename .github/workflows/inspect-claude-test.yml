# One-shot remote-runner — fetch the failed claude-test run's logs and write
# them to a file the operator session can read. Self-deletes after.
#
# Trigger: push to main on this workflow's own path.
# Authority: GITHUB_TOKEN with actions:read (workflow logs) + contents:write (file write + self-delete).

name: inspect-claude-test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inspect-claude-test.yml'

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent claude-test runs and failed-run logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          mkdir -p _debug
          {
            echo "=== recent claude-test runs ==="
            gh run list --workflow=claude-test.yml --limit 5 --json databaseId,status,conclusion,event,createdAt,headSha 2>&1
            echo ""
            echo "=== conclusion summary ==="
            gh run list --workflow=claude-test.yml --limit 5 --json databaseId,conclusion --jq '.[]' 2>&1
            echo ""
            echo "=== most recent failed/cancelled run logs (tail 400) ==="
            run_id=$(gh run list --workflow=claude-test.yml --limit 5 --json databaseId,conclusion --jq '[.[] | select(.conclusion=="failure" or .conclusion=="cancelled" or .conclusion=="action_required")][0].databaseId' 2>/dev/null)
            if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
              echo "run_id: $run_id"
              echo ""
              gh run view "$run_id" --log-failed 2>&1 | tail -400
            else
              echo "(no failed run located; falling back to most recent run)"
              run_id=$(gh run list --workflow=claude-test.yml --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null)
              echo "run_id: $run_id"
              echo ""
              gh run view "$run_id" --log 2>&1 | tail -400
            fi
          } > _debug/claude-test-inspect.log 2>&1
          ls -la _debug/

      - name: Commit log file + self-delete
        run: |
          git config user.name "cnos-remote-runner[bot]"
          git config user.email "cnos-remote-runner@cnos.local"
          git add _debug/claude-test-inspect.log
          git rm .github/workflows/inspect-claude-test.yml
          git commit -m "debug: capture claude-test run logs + remove one-shot inspect workflow"
          git push origin main
