name: install-wake golden

# Re-renders every package-owned wake provider declaration and verifies
# the committed golden fixture matches byte-for-byte. Drift between the
# committed golden and a fresh render indicates one of:
#   - the renderer changed but the golden was not re-committed,
#   - the wake-provider manifest changed but the golden was not re-rendered,
#   - the prompt template changed but the golden was not re-rendered,
#   - the renderer introduced non-determinism (timestamp, environment leak).
#
# Owned by Sub 3 of cnos#467 (cn-wake-install; cnos#476). The "golden
# fixture + CI re-render" mechanism is AC6 of cnos#476.

on:
  push:
    branches: [main, 'cycle/*']
    paths:
      - 'src/packages/cnos.core/commands/install-wake/**'
      - 'src/packages/cnos.core/orchestrators/**'
      - 'src/packages/cnos.cds/orchestrators/**'
      - '.github/workflows/install-wake-golden.yml'
      - '.github/workflows/cnos-cds-dispatch.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/packages/cnos.core/commands/install-wake/**'
      - 'src/packages/cnos.core/orchestrators/**'
      - 'src/packages/cnos.cds/orchestrators/**'
      - '.github/workflows/install-wake-golden.yml'
      - '.github/workflows/cnos-cds-dispatch.yml'

jobs:
  golden-diff:
    name: Re-render + diff per-package goldens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify jq present
        # jq is installed by default on ubuntu-latest runners; assert
        # before invoking so failures surface as a precise prerequisite
        # error rather than a renderer crash.
        run: jq --version

      - name: Re-render agent-admin wake (cnos.core)
        run: |
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake agent-admin

      - name: Re-render cds-dispatch wake (cnos.cds)
        # cnos.cds/orchestrators/cds-dispatch is LIVE post cnos#487
        # (Sub 5C of cnos#467; activation_state flipped from
        # declaration-only to live). The renderer no longer refuses
        # and no override flag is required. The synthetic
        # declaration-only refusal smoke moved to a dedicated fixture
        # (see AC5 step below + src/packages/cnos.core/commands/install-wake/test-fixtures/declaration-only/).
        run: |
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake cds-dispatch

      - name: Verify goldens unchanged
        # `git diff --exit-code` returns non-zero if any tracked file
        # has changed in the working tree after the re-render. Both
        # goldens are checked in one diff invocation so a drift on
        # either surfaces with the same `::error::` annotation.
        run: |
          if ! git diff --exit-code -- \
                src/packages/cnos.core/orchestrators/agent-admin/cnos-agent-admin.golden.yml \
                src/packages/cnos.cds/orchestrators/cds-dispatch/cnos-cds-dispatch.golden.yml; then
            echo "::error::Golden drift detected. Re-run \`cn install-wake <wake-name>\` locally and commit the result."
            exit 1
          fi
          echo "Goldens match re-render: clean."

      - name: Verify live cds-dispatch workflow matches golden (sha256)
        # Post cnos#487 (Sub 5C), the live substrate workflow at
        # .github/workflows/cnos-cds-dispatch.yml is the rendered
        # output of `cn install-wake cds-dispatch --out
        # .github/workflows/cnos-cds-dispatch.yml`. Its sha256 MUST
        # equal the per-package golden's sha256 (byte-identical),
        # otherwise the live wake has drifted from the manifest-
        # owned contract surface.
        run: |
          set -eu
          live_sha=$(sha256sum .github/workflows/cnos-cds-dispatch.yml | cut -d' ' -f1)
          golden_sha=$(sha256sum src/packages/cnos.cds/orchestrators/cds-dispatch/cnos-cds-dispatch.golden.yml | cut -d' ' -f1)
          if [ "$live_sha" != "$golden_sha" ]; then
            echo "::error::Live cds-dispatch workflow drift from golden."
            echo "live:   $live_sha (.github/workflows/cnos-cds-dispatch.yml)"
            echo "golden: $golden_sha (src/packages/cnos.cds/orchestrators/cds-dispatch/cnos-cds-dispatch.golden.yml)"
            echo "Re-run \`cn install-wake cds-dispatch --out .github/workflows/cnos-cds-dispatch.yml\` and commit."
            exit 1
          fi
          echo "Live cds-dispatch workflow matches golden: $live_sha"

      - name: Verify idempotence (second render is a no-op) — agent-admin
        # AC6's idempotence invariant: two consecutive renders produce
        # byte-identical output. Hash before/after; diff exits 0.
        run: |
          sha_before=$(sha256sum src/packages/cnos.core/orchestrators/agent-admin/cnos-agent-admin.golden.yml | cut -d' ' -f1)
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake agent-admin
          sha_after=$(sha256sum src/packages/cnos.core/orchestrators/agent-admin/cnos-agent-admin.golden.yml | cut -d' ' -f1)
          if [ "$sha_before" != "$sha_after" ]; then
            echo "::error::Renderer is non-deterministic (agent-admin). Two consecutive renders produced different output."
            echo "before: $sha_before"
            echo "after:  $sha_after"
            exit 1
          fi
          echo "Idempotence verified (agent-admin): $sha_before"

      - name: Verify idempotence (second render is a no-op) — cds-dispatch
        # AC6 idempotence for the dispatch-shape golden. Mirrors the
        # agent-admin step above; no --activation-state-override
        # needed post cnos#487 (manifest is live).
        run: |
          sha_before=$(sha256sum src/packages/cnos.cds/orchestrators/cds-dispatch/cnos-cds-dispatch.golden.yml | cut -d' ' -f1)
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake cds-dispatch
          sha_after=$(sha256sum src/packages/cnos.cds/orchestrators/cds-dispatch/cnos-cds-dispatch.golden.yml | cut -d' ' -f1)
          if [ "$sha_before" != "$sha_after" ]; then
            echo "::error::Renderer is non-deterministic (cds-dispatch). Two consecutive renders produced different output."
            echo "before: $sha_before"
            echo "after:  $sha_after"
            exit 1
          fi
          echo "Idempotence verified (cds-dispatch): $sha_before"

      - name: Verify YAML parses (both goldens)
        # AC3 oracle. Use python3 + PyYAML (preinstalled on
        # ubuntu-latest) rather than pulling in a YAML CLI.
        run: |
          python3 -c "
          import yaml
          for p in [
            'src/packages/cnos.core/orchestrators/agent-admin/cnos-agent-admin.golden.yml',
            'src/packages/cnos.cds/orchestrators/cds-dispatch/cnos-cds-dispatch.golden.yml',
          ]:
              yaml.safe_load(open(p))
          print('YAML parses (both goldens).')
          "

      - name: Verify substrate structural shape — agent-admin
        # AC3 oracle: rendered workflow has on:, permissions:,
        # concurrency:, jobs:, anthropics/claude-code-action@v1.
        run: |
          set -eu
          f=src/packages/cnos.core/orchestrators/agent-admin/cnos-agent-admin.golden.yml
          for needle in '^on:' '^permissions:' '^concurrency:' '^jobs:' 'anthropics/claude-code-action@v1'; do
            if ! grep -qE "$needle" "$f"; then
              echo "::error::Missing required substrate shape (agent-admin): $needle"
              exit 1
            fi
          done
          echo "Substrate shape OK (agent-admin)."

      - name: Verify substrate structural shape — cds-dispatch
        # AC3 oracle for the dispatch shape. Adds dispatch-specific
        # checks: on.issues.types includes 'labeled'; concurrency
        # group uses cds-dispatch-<agent> pattern; job-level if:
        # gates schedule unconditionally (OG-2 per
        # .cdd/unreleased/485/gamma-scaffold.md §6).
        run: |
          set -eu
          f=src/packages/cnos.cds/orchestrators/cds-dispatch/cnos-cds-dispatch.golden.yml
          for needle in '^on:' '^permissions:' '^concurrency:' '^jobs:' 'anthropics/claude-code-action@v1' 'types: \[labeled\]' '^  group: cds-dispatch-sigma$'; do
            if ! grep -qE "$needle" "$f"; then
              echo "::error::Missing required substrate shape (cds-dispatch): $needle"
              exit 1
            fi
          done
          # OG-2 — schedule events must fire unconditionally; the
          # job-level if: gate must include `github.event_name ==
          # 'schedule'` so a scheduled sweep fires without depending
          # on github.event.label (which is undefined at schedule
          # firing time).
          if ! grep -qE "github\.event_name == 'schedule'" "$f"; then
            echo "::error::OG-2 violation: cds-dispatch if: gate does not allow schedule events unconditionally."
            exit 1
          fi
          echo "Substrate shape OK (cds-dispatch); OG-2 schedule gate present."

      - name: AC5 — declaration-only refusal (synthetic fixture)
        # AC5: the renderer's activation_state refusal gate (exit 3 +
        # precise stderr per wake-provider/SKILL.md §3.10).
        #
        # Pre-cycle/487 this step ran `cn install-wake cds-dispatch`
        # (no override) against the cnos#483 manifest (which was
        # activation_state: declaration-only). cycle/487 (Sub 5C)
        # flipped that manifest to `live` (cds-dispatch is now in
        # production substrate), so the AC5 assertion was re-pointed
        # at a synthetic declaration-only fixture under
        # src/packages/cnos.core/commands/install-wake/test-fixtures/
        # to preserve the refusal-gate smoke. Per the cycle/487 γ
        # scaffold's design fork D2 (Option B: synthetic fixture).
        run: |
          set -u
          rc=0
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake test-declaration-only \
            --manifest src/packages/cnos.core/commands/install-wake/test-fixtures/declaration-only/wake-provider.json \
            2>/tmp/ac5.err >/dev/null || rc=$?
          if [ "$rc" != "3" ]; then
            echo "::error::AC5: expected exit 3 on declaration-only refusal; got $rc"
            cat /tmp/ac5.err
            exit 1
          fi
          if ! grep -qF 'declaration-only' /tmp/ac5.err; then
            echo "::error::AC5: stderr does not name the activation_state value 'declaration-only'."
            cat /tmp/ac5.err
            exit 1
          fi
          if ! grep -qE 'cnos#454|cnos#467|preconditions' /tmp/ac5.err; then
            echo "::error::AC5: stderr does not include activation_state_notes content (no mention of cnos#454/cnos#467/preconditions)."
            cat /tmp/ac5.err
            exit 1
          fi
          echo "AC5 refusal verified (synthetic fixture): exit 3 + precise error."

      - name: AC2 negative-case smoke (malformed manifest is rejected)
        run: |
          set -eu
          set -o pipefail
          tmp=$(mktemp -d)
          mkdir -p "$tmp/orchestrators/test-wake"
          echo '{"name": "test-wake"}' > "$tmp/orchestrators/test-wake/wake-provider.json"
          echo "" > "$tmp/orchestrators/test-wake/prompt.md"
          if ./src/packages/cnos.core/commands/install-wake/cn-install-wake test-wake \
              --manifest "$tmp/orchestrators/test-wake/wake-provider.json" 2>&1 | tee /tmp/neg.log; then
            echo "::error::Renderer accepted malformed manifest (schema missing); expected exit 2 per wake-provider/SKILL.md §3.5."
            exit 1
          fi
          if ! grep -q 'required field "schema"' /tmp/neg.log; then
            echo "::error::Renderer rejected malformed manifest but error message did not name the missing field."
            cat /tmp/neg.log
            exit 1
          fi
          echo "AC2 negative case rejected with precise error."
          rm -rf "$tmp"

      - name: AC4 (cycle/496) — write-fence positive (green on no-op)
        # cycle/496 AC7 (amended) oracle, layer 1: the write fence
        # must return zero violations when the wake's work phase did
        # NOT write anything under .cn-*/logs/. Simulates the no-op
        # selector-scan case (the empirical baseline for cds-dispatch
        # firings on an empty queue).
        #
        # The fence script is the same shell block the renderer
        # appends to package-dispatch workflows. We instantiate it
        # here in a sub-shell against a clean working tree + no
        # commit-graph delta and assert exit 0.
        run: |
          set -euo pipefail
          # Work in a dedicated fixture dir to keep cleanup simple.
          fixture=$(mktemp -d)
          cd "$fixture"
          git init --quiet -b main
          git config user.email "fixture@cycle-496"
          git config user.name "fixture-cycle-496"
          mkdir -p .cn-sigma/logs
          # Seed a baseline commit (so HEAD@{1} resolves later).
          echo "baseline" > README.md
          git add README.md
          git commit --quiet -m "baseline"
          baseline_sha=$(git rev-parse HEAD)
          # No-op: do nothing. The fence should return green.
          # Reproduce the fence's local-scope check inline.
          violation=0
          wt="$(git status --porcelain -- ':(glob).cn-*/logs/**' 2>/dev/null || true)"
          if [ -n "$wt" ]; then
            violation=1
            echo "wt-positive: $wt"
          fi
          commits=""
          if git rev-parse --verify HEAD@{1} >/dev/null 2>&1; then
            commits="$(git log HEAD@{1}..HEAD --name-only --pretty=format: -- ':(glob).cn-*/logs/**' 2>/dev/null | grep -v '^$' || true)"
          fi
          if [ -n "$commits" ]; then
            violation=1
            echo "commit-positive: $commits"
          fi
          if [ "$violation" -ne 0 ]; then
            echo "::error::AC4 cycle/496 positive: fence false-failed on a no-op working tree."
            exit 1
          fi
          echo "AC4 cycle/496 positive: fence green on no-op (no .cn-*/logs/ writes detected)."
          cd /
          rm -rf "$fixture"

      - name: AC4 (cycle/496) — write-fence negative (catches violation)
        # cycle/496 AC7 (amended) oracle, layer 2: the write fence
        # must fire dispatch_activation_log_write_violation when the
        # wake's work phase wrote under .cn-*/logs/. Two sub-cases:
        #   (a) uncommitted working-tree write (staged + unstaged)
        #   (b) committed write in the local commit graph
        # Both must trip the fence.
        run: |
          set -euo pipefail
          # Sub-case (a): working-tree uncommitted write.
          fixture=$(mktemp -d)
          cd "$fixture"
          git init --quiet -b main
          git config user.email "fixture@cycle-496"
          git config user.name "fixture-cycle-496"
          mkdir -p .cn-sigma/logs
          echo "baseline" > README.md
          git add README.md
          git commit --quiet -m "baseline"
          # Synthetic dispatch-wake violation: touch the channel log.
          echo "## synthetic fixture entry" > .cn-sigma/logs/20260624-fixture.md
          git add .cn-sigma/logs/20260624-fixture.md
          # Run the fence (staged but uncommitted — wt check should catch).
          violation_a=0
          wt="$(git status --porcelain -- ':(glob).cn-*/logs/**' 2>/dev/null || true)"
          if [ -n "$wt" ]; then
            violation_a=1
          fi
          if [ "$violation_a" -ne 1 ]; then
            echo "::error::AC4 cycle/496 negative (a): fence did NOT catch a staged working-tree write under .cn-*/logs/."
            exit 1
          fi
          echo "AC4 cycle/496 negative (a): fence caught staged working-tree write — OK."
          cd /
          rm -rf "$fixture"
          # Sub-case (b): committed write in the local commit graph.
          fixture=$(mktemp -d)
          cd "$fixture"
          git init --quiet -b main
          git config user.email "fixture@cycle-496"
          git config user.name "fixture-cycle-496"
          mkdir -p .cn-sigma/logs
          echo "baseline" > README.md
          git add README.md
          git commit --quiet -m "baseline"
          baseline_sha=$(git rev-parse HEAD)
          # Synthetic violation: commit a channel-log write.
          echo "## synthetic fixture entry" > .cn-sigma/logs/20260624-fixture.md
          git add .cn-sigma/logs/20260624-fixture.md
          git commit --quiet -m "synthetic dispatch-wake channel-log violation"
          # Run the fence's commit-graph layer.
          violation_b=0
          commits=""
          if git rev-parse --verify HEAD@{1} >/dev/null 2>&1; then
            commits="$(git log HEAD@{1}..HEAD --name-only --pretty=format: -- ':(glob).cn-*/logs/**' 2>/dev/null | grep -v '^$' || true)"
          fi
          if [ -n "$commits" ]; then
            violation_b=1
          fi
          if [ "$violation_b" -ne 1 ]; then
            echo "::error::AC4 cycle/496 negative (b): fence did NOT catch a committed write under .cn-*/logs/."
            echo "(HEAD@{1}..HEAD diff returned empty; expected non-empty)"
            exit 1
          fi
          echo "AC4 cycle/496 negative (b): fence caught committed write — OK ($commits)."
          cd /
          rm -rf "$fixture"

      - name: AC4 (cycle/496) — write-fence multi-commit baseline (R1)
        # cycle/496 R1 (operator iterate-narrowly): HEAD@{1}..HEAD is NOT a
        # safe baseline for multi-commit work phases. If commit 1 writes
        # .cn-*/logs/ and commit 2 changes something else, HEAD@{1} points
        # at commit 2's parent (commit 1) so commit 1's WRITE would be in
        # the diff — BUT only because the test below seeds a baseline commit
        # before the work phase. Without that baseline-commit shape, the
        # reflog can land HEAD@{1} at the violating commit itself, masking
        # the write.
        #
        # The R1 fix records CN_WAKE_BASE_SHA in an explicit pre-work step
        # (rendered BEFORE the claude-code-action work phase). The fence
        # then compares $CN_WAKE_BASE_SHA..HEAD, which is stable across
        # ANY commit shape the work phase produces (one, many, none).
        #
        # This fixture explicitly tests the multi-commit case: baseline →
        # violation in commit 1 → unrelated change in commit 2 → fence
        # must STILL fail because CN_WAKE_BASE_SHA..HEAD covers BOTH
        # commits and sees the violating path.
        run: |
          set -euo pipefail
          fixture=$(mktemp -d)
          cd "$fixture"
          git init --quiet -b main
          git config user.email "fixture@cycle-496-r1"
          git config user.name "fixture-cycle-496-r1"
          mkdir -p .cn-sigma/logs
          echo "baseline" > README.md
          git add README.md
          git commit --quiet -m "baseline"
          # Record the pre-work baseline — what the rendered workflow's
          # 'Write fence — record pre-work baseline SHA' step would emit
          # to $GITHUB_ENV before the claude-code-action work phase.
          CN_WAKE_BASE_SHA=$(git rev-parse HEAD)
          # Commit 1: WRITES .cn-sigma/logs/ (the violation).
          echo "## synthetic R1 violation entry" > .cn-sigma/logs/20260624-r1-violation.md
          git add .cn-sigma/logs/20260624-r1-violation.md
          git commit --quiet -m "synthetic dispatch-wake channel-log violation (R1 commit 1)"
          # Commit 2: changes something UNRELATED to .cn-*/logs/.
          # This is the commit HEAD@{1} would point at; the violation in
          # commit 1 would be invisible to a HEAD@{1}..HEAD check.
          echo "unrelated change" >> README.md
          git add README.md
          git commit --quiet -m "unrelated change (R1 commit 2)"
          # Now run the R1 fence — must catch the violation in commit 1.
          violation_c=0
          commits=""
          # Use CN_WAKE_BASE_SHA (the R1 primary baseline).
          if [ -n "${CN_WAKE_BASE_SHA:-}" ] && git rev-parse --verify "$CN_WAKE_BASE_SHA" >/dev/null 2>&1 && [ "$(git rev-parse HEAD)" != "$CN_WAKE_BASE_SHA" ]; then
            commits="$(git log "${CN_WAKE_BASE_SHA}..HEAD" --name-only --pretty=format: -- ':(glob).cn-*/logs/**' 2>/dev/null | grep -v '^$' || true)"
          fi
          if [ -n "$commits" ]; then
            violation_c=1
          fi
          if [ "$violation_c" -ne 1 ]; then
            echo "::error::AC4 cycle/496 R1 multi-commit: fence did NOT catch a violation buried in commit 1 of a multi-commit run."
            echo "(CN_WAKE_BASE_SHA..HEAD covers BOTH commits; commit 1's .cn-*/logs/ write should appear in the diff)"
            exit 1
          fi
          echo "AC4 cycle/496 R1 multi-commit: fence caught buried commit-1 violation — OK ($commits)."
          # Also verify the OLD HEAD@{1}-only check would have FAILED to
          # catch this (the empirical motivator for the R1 fix). HEAD@{1}
          # after the second commit points at commit 1 — so in THIS
          # contrived shape HEAD@{1}..HEAD covers only commit 2 (the
          # unrelated change). NOTE: reflog behavior in fresh repos can
          # vary; this assertion is informational, not load-bearing.
          old_check_commits="$(git log HEAD@{1}..HEAD --name-only --pretty=format: -- ':(glob).cn-*/logs/**' 2>/dev/null | grep -v '^$' || true)"
          if [ -z "$old_check_commits" ]; then
            echo "AC4 cycle/496 R1 multi-commit (informational): HEAD@{1}..HEAD did NOT catch the buried violation — confirms the R1 baseline fix is necessary."
          else
            echo "AC4 cycle/496 R1 multi-commit (informational): HEAD@{1}..HEAD happened to catch this shape; the R1 fix is still load-bearing for more complex multi-commit shapes."
          fi
          cd /
          rm -rf "$fixture"

      - name: AC4 (cycle/496) — write-fence catches committed delete (R2)
        # cycle/496 R2 (operator iterate-narrowly): a committed DELETE
        # of a tracked .cn-*/logs/ path is a write/ownership violation.
        # The R1 fence used `git log ... --diff-filter=ACMR ... -- $pathspec`
        # which catches Added/Copied/Modified/Renamed but NOT Deleted.
        # A dispatch wake could delete .cn-sigma/logs/<file>.md, commit
        # the deletion, leave the working tree clean, and the fence
        # would not report it. R2 removes --diff-filter entirely so any
        # touched path (incl. delete + type-change) under .cn-*/logs/
        # in the wake's local commit graph is a violation.
        #
        # Fixture shape:
        #   1. baseline + tracked .cn-sigma/logs/delete-me.md
        #   2. record CN_WAKE_BASE_SHA
        #   3. commit DELETION of .cn-sigma/logs/delete-me.md
        #   4. (optional) unrelated 2nd commit to confirm multi-commit
        #      shape doesn't help the deletion escape
        #   5. fence runs CN_WAKE_BASE_SHA..HEAD WITHOUT --diff-filter
        #   6. MUST catch the deletion violation
        run: |
          set -euo pipefail
          fixture=$(mktemp -d)
          cd "$fixture"
          git init --quiet -b main
          git config user.email "fixture@cycle-496-r2"
          git config user.name "fixture-cycle-496-r2"
          mkdir -p .cn-sigma/logs
          # Baseline: README.md + tracked channel-log file.
          echo "baseline" > README.md
          echo "## tracked admin entry" > .cn-sigma/logs/delete-me.md
          git add README.md .cn-sigma/logs/delete-me.md
          git commit --quiet -m "baseline (with tracked .cn-sigma/logs/delete-me.md)"
          CN_WAKE_BASE_SHA=$(git rev-parse HEAD)
          # Commit 1: DELETE .cn-sigma/logs/delete-me.md (the violation).
          git rm --quiet .cn-sigma/logs/delete-me.md
          git commit --quiet -m "synthetic dispatch-wake channel-log deletion (R2 commit 1)"
          # Commit 2: unrelated change (confirms multi-commit doesn't help).
          echo "unrelated change" >> README.md
          git add README.md
          git commit --quiet -m "unrelated change (R2 commit 2)"
          # Working tree clean? Verify (R2's bite is that wt is clean
          # because the delete is committed).
          wt_check="$(git status --porcelain -- ':(glob).cn-*/logs/**' 2>/dev/null || true)"
          if [ -n "$wt_check" ]; then
            echo "::error::AC4 cycle/496 R2 fixture setup: working tree unexpectedly dirty under .cn-*/logs/ (delete should be committed)."
            exit 1
          fi
          # Run the R2 fence (no --diff-filter; CN_WAKE_BASE_SHA..HEAD).
          violation_d=0
          commits=""
          if [ -n "${CN_WAKE_BASE_SHA:-}" ] && git rev-parse --verify "$CN_WAKE_BASE_SHA" >/dev/null 2>&1 && [ "$(git rev-parse HEAD)" != "$CN_WAKE_BASE_SHA" ]; then
            commits="$(git log "${CN_WAKE_BASE_SHA}..HEAD" --name-only --pretty=format: -- ':(glob).cn-*/logs/**' 2>/dev/null | grep -v '^$' || true)"
          fi
          if [ -n "$commits" ]; then
            violation_d=1
          fi
          if [ "$violation_d" -ne 1 ]; then
            echo "::error::AC4 cycle/496 R2: fence did NOT catch a committed delete of .cn-sigma/logs/delete-me.md (deletion escape — R0/R1 --diff-filter=ACMR class)."
            exit 1
          fi
          echo "AC4 cycle/496 R2: fence caught committed delete — OK ($commits)."
          # Informational: confirm the OLD R1 --diff-filter=ACMR check
          # would have MISSED this. ACMR excludes deletes; the fence
          # would return empty and the deletion would escape.
          old_acmr_check="$(git log "${CN_WAKE_BASE_SHA}..HEAD" --name-only --diff-filter=ACMR --pretty=format: -- ':(glob).cn-*/logs/**' 2>/dev/null | grep -v '^$' || true)"
          if [ -z "$old_acmr_check" ]; then
            echo "AC4 cycle/496 R2 (informational): old --diff-filter=ACMR check returned empty — confirms the R2 fix is necessary."
          else
            echo "AC4 cycle/496 R2 (informational): --diff-filter=ACMR caught this shape; R2 fix is still load-bearing for pure-delete commits."
          fi
          cd /
          rm -rf "$fixture"

      - name: AC4 (cycle/496) — write-fence false-positive resistance
        # cycle/496 AC7 (amended) load-bearing oracle (FN-1): the
        # fence MUST NOT false-fail when a parallel admin-wake fixture
        # commits to .cn-sigma/logs/YYYYMMDD.md on a fixture-only
        # branch during the dispatch run. The fence inspects only its
        # own local writes (working tree + this run's commit graph)
        # — NOT remote-state delta — so the parallel admin-wake's
        # writes are invisible to the dispatch fence.
        #
        # Mechanically: simulate by setting up TWO separate working
        # trees / branches. The "dispatch" tree has no .cn-*/logs/
        # writes. The "admin" tree has a .cn-*/logs/ write committed
        # to its own branch. The dispatch fence (running in the
        # dispatch tree) inspects the dispatch tree's local state
        # only; it must not consult the admin tree.
        run: |
          set -euo pipefail
          # Dispatch tree (where the fence runs).
          dispatch=$(mktemp -d)
          cd "$dispatch"
          git init --quiet -b main
          git config user.email "fixture-dispatch@cycle-496"
          git config user.name "fixture-dispatch"
          mkdir -p .cn-sigma/logs
          echo "baseline" > README.md
          git add README.md
          git commit --quiet -m "baseline (dispatch tree)"
          # Admin tree (simulates the parallel admin-wake firing in a
          # separate concurrency group).
          admin=$(mktemp -d)
          cd "$admin"
          git init --quiet -b main
          git config user.email "fixture-admin@cycle-496"
          git config user.name "fixture-admin"
          mkdir -p .cn-sigma/logs
          echo "baseline" > README.md
          git add README.md
          git commit --quiet -m "baseline (admin tree)"
          # Admin commits legitimately to .cn-sigma/logs/.
          echo "## admin wake entry" > .cn-sigma/logs/20260624-admin.md
          git add .cn-sigma/logs/20260624-admin.md
          git commit --quiet -m "admin wake: legitimate channel-log write"
          # Now run the dispatch fence IN THE DISPATCH TREE. It must
          # see no local writes.
          cd "$dispatch"
          violation=0
          wt="$(git status --porcelain -- ':(glob).cn-*/logs/**' 2>/dev/null || true)"
          if [ -n "$wt" ]; then
            violation=1
          fi
          commits=""
          if git rev-parse --verify HEAD@{1} >/dev/null 2>&1; then
            commits="$(git log HEAD@{1}..HEAD --name-only --pretty=format: -- ':(glob).cn-*/logs/**' 2>/dev/null | grep -v '^$' || true)"
          fi
          if [ -n "$commits" ]; then
            violation=1
          fi
          if [ "$violation" -ne 0 ]; then
            echo "::error::AC4 cycle/496 false-positive: dispatch fence false-failed when a parallel admin-wake tree wrote .cn-*/logs/ (FN-1 violation)."
            echo "wt=$wt"
            echo "commits=$commits"
            exit 1
          fi
          echo "AC4 cycle/496 false-positive resistance: dispatch fence inspected only its own local state — admin tree's writes were invisible."
          cd /
          rm -rf "$dispatch" "$admin"

      - name: AC4 (cycle/496) — renderer refusal on mis-declaration
        # cycle/496 AC4 oracle: cn install-wake exits code 4 + stderr
        # names the mis-declaration when handed a package-dispatch
        # shape manifest declaring activation_log_writer:true (the
        # mis-declaration). Test fixture lives at
        # src/packages/cnos.core/commands/install-wake/test-fixtures/
        # log-writer-misdeclaration/.
        run: |
          set -u
          rc=0
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake test-log-writer-misdeclaration \
            --manifest src/packages/cnos.core/commands/install-wake/test-fixtures/log-writer-misdeclaration/wake-provider.json \
            --activation-state-override live \
            --out /tmp/cycle-496-misdecl.yml \
            2>/tmp/cycle-496-misdecl.err >/dev/null || rc=$?
          if [ "$rc" != "4" ]; then
            echo "::error::AC4 cycle/496 refusal: expected exit 4 on activation_log_writer mis-declaration; got $rc"
            cat /tmp/cycle-496-misdecl.err
            exit 1
          fi
          if ! grep -qF 'activation_log_writer mis-declaration' /tmp/cycle-496-misdecl.err; then
            echo "::error::AC4 cycle/496 refusal: stderr does not contain 'activation_log_writer mis-declaration'."
            cat /tmp/cycle-496-misdecl.err
            exit 1
          fi
          echo "AC4 cycle/496 refusal verified: exit 4 + precise stderr."

      - name: W2 parity check — render(SKILL.md) == render(JSON+prompt)
        # cnos#524 W2 dual-source parity gate. The committed goldens (confirmed
        # byte-identical to JSON+prompt renders by the steps above) are the ground
        # truth for render(JSON+prompt). This step proves render(SKILL.md) is
        # byte-identical to the goldens, establishing: render(SKILL.md) ==
        # render(JSON+prompt). Source-attribution header comment lines (^#) are
        # excluded from the comparison — they name the source file and differ by
        # design between the two render paths. Exit 5 on parity failure; exit 0
        # on pass. Requires python3 + pyyaml (pre-installed on ubuntu-latest).
        run: |
          set -euo pipefail
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake agent-admin --parity-check
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake cds-dispatch --parity-check

      - name: AC8 (cycle/476) + AC7 (cycle/485) renderer-side authority audit
        # The renderer source MUST NOT encode role decisions; those
        # come from the manifest + the inlined prompt body. Two
        # leak-audit greps run side-by-side:
        #   - AC8 (from cycle/476): admin-shape role-decision strings
        #     (admin_only / disallowed_surfaces / defer_path /
        #     cell_execution) must not appear in the renderer source.
        #   - AC7 (from cycle/485): dispatch-shape role-decision
        #     strings (protocol:cds / cdr / cdw / dispatch:cell /
        #     status:todo) must not appear either. These come from
        #     the manifest's selector.include[] + protocol field via
        #     jq reads at render time — the renderer source itself
        #     stays manifest-driven.
        #
        # Note on `|| true`: GitHub Actions invokes `run:` blocks under
        # `/usr/bin/bash -e {0}`, so a command substitution that exits
        # non-zero terminates the step before the `if` check fires.
        # `grep -c` returns exit 1 when the count is zero (POSIX), which
        # is the intended-success path here (we WANT zero leaks). The
        # `|| true` makes the substitution exit-0-safe while preserving
        # the count for diagnostics; the substantive check is the
        # `[ "$n" != "0" ]` guard below, which still fires on real leaks.
        run: |
          # AC8 audit (admin shape) — scoped renderer-side authority audit.
          #
          # The renderer is role-agnostic substrate: admin-shape role-decision
          # logic must live in the manifest, not here. This audit fails only
          # when the admin-shape field names appear in EXECUTABLE / RENDERED
          # role-decision logic. It deliberately ignores two non-leaks:
          #   (a) comments — documentation of the manifest contract;
          #   (b) stderr validation diagnostics — the renderer NAMES these
          #       manifest fields only to reject a malformed manifest
          #       (die / manifest_error / log_writer_mis_declaration, all of
          #       which echo to >&2); naming a field to validate it is not
          #       encoding role behavior.
          #
          # Root cause of the prior false positive (#475-D): the old check used
          # `grep -iE 'admin.only|defer.path|...'` — regex `.` matches any char,
          # so `admin.only` matched the renderer's own `admin_only` docs and
          # diagnostics, and the scan was source-wide (no comment/diagnostic
          # exclusion). It self-matched the renderer's contract documentation.
          # Fix: literal field names + exclude comments and diagnostic calls.
          admin_leaks=$(grep -nE 'admin_only|disallowed_surfaces|defer_path|cell_execution' \
              src/packages/cnos.core/commands/install-wake/cn-install-wake \
            | grep -vE '^[0-9]+:[[:space:]]*#' \
            | grep -vE '(die|manifest_error|log_writer_mis_declaration)[[:space:]]' \
            || true)
          if [ -n "$admin_leaks" ]; then
            echo "::error::Renderer encodes admin-shape role-decision logic (AC8). Offending lines:"
            echo "$admin_leaks"
            exit 1
          fi
          echo "AC8 renderer-side (admin shape): 0 role-decision leaks (comments + stderr diagnostics excluded)."
          # AC7 audit (dispatch shape; cycle/485).
          n_dispatch=$(grep -ciE 'protocol:cds|cdr|cdw|dispatch:cell|status:todo' src/packages/cnos.core/commands/install-wake/cn-install-wake || true)
          if [ "$n_dispatch" != "0" ]; then
            echo "::error::Renderer source leaks dispatch-shape role-decision strings (AC7). Count: $n_dispatch"
            grep -niE 'protocol:cds|cdr|cdw|dispatch:cell|status:todo' src/packages/cnos.core/commands/install-wake/cn-install-wake
            exit 1
          fi
          echo "AC7 renderer-side (dispatch shape): 0 role-decision leaks."

