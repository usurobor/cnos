# One-shot remote-runner workflow — set the GitHub repo description.
#
# Doctrine: docs/gamma/essays/BOX-AND-THE-RUNNER.md
# Skill:    src/packages/cnos.cdd/skills/cdd/delta/SKILL.md §8
#
# Operator-authored description change. api.github.com is unreachable from
# the operator's sandbox and no MCP tool edits repo metadata, so the change
# runs here where GITHUB_TOKEN can PATCH the repository. Self-deletes after.
#
# Trigger:   push to main on this workflow's own path.
# Authority: GITHUB_TOKEN — administration: write (repo settings) + contents: write (self-delete).
# Acceptor:  Operator confirms the "About" description on the repo home page.

name: One-shot — set repo description

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/set-repo-description.yml'

permissions:
  administration: write
  contents: write

jobs:
  set-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repository description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DESC="Coherence Network OS — Git-native protocol/runtime for receipt-bearing human+AI work along a path of decreasing incoherence."
          gh api -X PATCH repos/usurobor/cnos -f description="$DESC"
          echo "--- verify ---"
          got=$(gh api repos/usurobor/cnos --jq '.description')
          echo "description now: $got"
          [ "$got" = "$DESC" ] || { echo "FAIL: description did not update"; exit 1; }

      - name: Self-delete this workflow
        run: |
          git config user.name "cnos-remote-runner[bot]"
          git config user.email "cnos-remote-runner@cnos.local"
          git rm .github/workflows/set-repo-description.yml
          git commit -m "chore: remove one-shot set-repo-description workflow"
          git push origin main
