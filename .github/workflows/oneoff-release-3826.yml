name: oneoff release 3.82.6

# One-off: build + publish release 3.82.6 — makes the cnos#613 PAT-free
# engine tier contract-clean (no PR finalizer step in engine renders).
# Builds four platform binaries + package index inline, runs the Tier-1 kata
# gate, asserts the engine render is contract-clean, publishes via
# action-gh-release (which creates the tag), then deletes itself.

on:
  push:
    paths:
      - '.github/workflows/oneoff-release-3826.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Cross-build platform binaries (pure stdlib, no cgo)
        working-directory: src/go
        run: |
          set -euo pipefail
          mkdir -p ../../dist
          build() {
            GOOS="$1" GOARCH="$2" go build \
              -ldflags "-X main.version=3.82.6" \
              -o "../../dist/cn-$3" ./cmd/cn
            chmod +x "../../dist/cn-$3"
          }
          build linux  amd64 linux-x64
          build linux  arm64 linux-arm64
          build darwin amd64 macos-x64
          build darwin arm64 macos-arm64
          ls -la ../../dist

      - name: Configure git identity (kata doctor needs one)
        run: |
          git config --global user.name "release-ci"
          git config --global user.email "release-ci@cnos.local"

      - name: Tier-1 kata gate (shipped linux binary)
        run: |
          set -euo pipefail
          cp dist/cn-linux-x64 cn
          export PATH="$PWD:$PATH"
          scripts/kata/run-all.sh

      - name: Engine-tier render assertion (cnos#613 contract-clean)
        run: |
          set -euo pipefail
          ./src/packages/cnos.core/commands/install-wake/cn-install-wake \
            cds-dispatch --tier engine --out /tmp/e.yml
          python3 - <<'PY'
          import yaml
          d=yaml.safe_load(open('/tmp/e.yml')); p=d['permissions']; t=open('/tmp/e.yml').read()
          assert p=={'contents':'read','issues':'write','pull-requests':'read'}, p
          # PAT-free + least-privilege + no PR-opening surface
          for bad in ['contents: write','pull-requests: write','id-token',
                      'SIGMA_WORKFLOW_PAT','CLAUDE_CODE_OAUTH_TOKEN','claude-code-action',
                      'Mechanical checkpoint + PR finalizer','cn cell finalize','gh pr','PR-scoped PAT']:
              assert bad not in t, f"forbidden in engine render: {bad}"
          assert 'Mechanical FSM engine (PAT-free)' in t and 'cn issues fsm' in t and '--apply' in t
          print('engine render contract-clean:', p)
          PY

      - name: Generate binary checksums
        run: |
          set -euo pipefail
          cd dist
          : > checksums.txt
          for bin in cn-*; do
            sha256sum "$bin" >> checksums.txt
          done
          cat checksums.txt

      - name: Build package tarballs and index
        run: |
          set -euo pipefail
          cd src/go && go build -o ../../cn ./cmd/cn && cd ../..
          ./cn build
          ls -la dist/packages/

      - name: Publish release 3.82.6
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 3.82.6
          name: 3.82.6
          target_commitish: main
          files: |
            dist/cn-linux-x64
            dist/cn-linux-arm64
            dist/cn-macos-x64
            dist/cn-macos-arm64
            dist/checksums.txt
            dist/packages/*.tar.gz
            dist/packages/index.json
          generate_release_notes: true

      - name: Self-delete this one-off workflow
        run: |
          set -euo pipefail
          git config user.name "release-ci"
          git config user.email "release-ci@cnos.local"
          git rm .github/workflows/oneoff-release-3826.yml
          git commit -m "chore: self-delete one-off release-3.82.6 workflow"
          git push origin HEAD:main
