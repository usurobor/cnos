# Wake workflow for Sigma-at-cnos.
#
# Trigger: opening an issue whose title contains "claude-wake".
# Authority: CLAUDE_CODE_OAUTH_TOKEN (operator's Claude Pro/Max subscription
# token, generated via `claude setup-token`, stored as a repo secret).
#
# Substrate: anthropics/claude-code-action@v1 — auth path verified
# end-to-end in cnos#435..#438; OIDC permission + token format both
# pinned in commits a42b3d35 and round-4 green (cnos#438).
#
# Composition: "Activate and attach as <agent-home-url>" — invokes the
# two peer skills in cnos.core/skills/agent/{activate,attach}/SKILL.md.
# The activate skill loads identity (Kernel + CA + Persona + Operator +
# state + identity confirmation). The attach skill detects mode from
# PWD origin (foreign-activation here — cnos is registered in
# cn-sigma:state/activations.md), detects attached state, and executes
# the foreign-activation follow-up sync procedure (§2.4 of attach
# skill).
#
# Future: scheduled cron once 2-3 manually-triggered wakes produce
# coherent entries. Initial cadence operator-driven.

name: claude-wake

on:
  issues:
    types: [opened]
  schedule:
    # Multiple staggered hourly entries — each cron is independently
    # scheduled, so dropped slots in one don't block others. Combined
    # effect: ~4 wakes/hour expected, ~15 min effective cadence.
    # Off-peak minutes avoid :00/:30 (high-load) and :15/:45 (cn-sigma
    # home wake slots, to keep the channel race-free).
    # See sigma log 20260602T20:35Z RCA + 20260602T<NEXT>Z directive
    # for rationale.
    - cron: '8 * * * *'
    - cron: '23 * * * *'
    - cron: '38 * * * *'
    - cron: '53 * * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

# Serialize wakes — never run two in parallel. Concurrent wakes would
# race on the channel surface (.cn-sigma/logs/) and produce duplicate
# entries or push conflicts. cancel-in-progress: false queues the new
# trigger behind any in-flight wake.
concurrency:
  group: claude-wake
  cancel-in-progress: false

jobs:
  wake:
    if: ${{ github.event_name == 'schedule' || contains(github.event.issue.title, 'claude-wake') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: "sigma@cnos.cn-sigma.cnos"
          bot_id: "41898282"
          settings: |
            {
              "permissions": {
                "allow": ["Read", "Write", "Edit", "MultiEdit", "Glob", "Grep", "Bash"]
              }
            }
          prompt: |
            Activate and attach as https://github.com/usurobor/cn-sigma.
