name: Build

on:
  push:
    branches: [main, 'cycle/*']
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Build
        working-directory: src/go
        run: go build ./...

      - name: Build binary
        working-directory: src/go
        run: go build -o cn ./cmd/cn

      - name: Test
        working-directory: src/go
        run: go test ./... -v

      - name: Vet
        working-directory: src/go
        run: go vet ./...

      # cnos#568 AC9: commands/issues-map and commands/issues-fsm are their
      # own Go modules (co-located under src/packages/, wired into go.work),
      # NOT covered by the `Test` step above — `go test ./...` from
      # src/go is CWD-relative to that module only (verified empirically:
      # `go list ./...` from src/go has no issues-fsm/issues-map packages).
      # This explicit step is what turns CI red if an issues-fsm fixture
      # regresses (e.g. the cnos#368 dead-in-progress-with-commits guard).
      - name: Test issues-fsm module (cnos#568 AC9)
        working-directory: src/packages/cnos.issues/commands/issues-fsm
        run: go test ./... -v

      - name: Dispatch boundary check (INVARIANTS.md T-002)
        working-directory: src/go
        run: |
          VIOLATIONS=""
          for f in internal/cli/cmd_*.go; do
            [ -f "$f" ] || continue
            case "$f" in *_test.go) continue;; esac
            if grep -qE "^\s*\"(os|net/http|encoding/json|archive/|compress/|crypto/|path/filepath)\"" "$f"; then
              VIOLATIONS="$VIOLATIONS\n  $f"
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Dispatch boundary violation (INVARIANTS.md T-002, eng/go §2.18)"
            echo -e "   Violations:$VIOLATIONS"
            exit 1
          fi
          echo "✓ Dispatch boundary: all cmd_*.go files are thin wrappers"

      - name: Smoke test
        working-directory: src/go
        run: |
          ./cn help

      # cnos#612 Mock F (docs/development/design/cn-repo-install-MOCKS.md
      # §Mock F) — CLI ergonomics for onboarding. Exercises the real binary
      # end to end, the same way a first-time tenant would (cnos#606 C3).
      - name: CLI ergonomics smoke test (cnos#612 F1-F4)
        working-directory: src/go
        run: |
          set -euo pipefail

          # F1 — cn --version / -V prints the version, exit 0.
          ./cn --version | grep -q '^cn v'
          ./cn -V | grep -q '^cn v'

          # F2 — --help/-h works on cn and every command incl. cn repo install.
          ./cn --help >/dev/null
          ./cn -h >/dev/null
          for c in "doctor" "status" "deps" "build" "update" "setup" "dispatch" \
                   "cell finalize" "cell return" "cell resume" \
                   "issues fsm" "issues map" "cdd verify" "activate" "repo install"; do
            ./cn $c --help >/dev/null || { echo "FAIL: cn $c --help did not exit 0"; exit 1; }
          done
          ./cn repo install --help | grep -q -- '--dry-run'

          # F3 — cn init refuses an unrecognized flag; scaffolds nothing.
          # Covers both the general case (--bogus) and the literal cnos#606
          # C3 repro (--help previously created a stray "cn---help/" dir).
          CN_BIN="$PWD/cn"
          rm -rf /tmp/cn-init-smoke && mkdir -p /tmp/cn-init-smoke
          cd /tmp/cn-init-smoke
          if "$CN_BIN" init --bogus >/dev/null 2>&1; then
            echo "FAIL: cn init --bogus should have failed"; exit 1
          fi
          if [ -n "$(ls -A /tmp/cn-init-smoke)" ]; then
            echo "FAIL: cn init --bogus scaffolded something"; ls -la /tmp/cn-init-smoke; exit 1
          fi
          "$CN_BIN" init --help >/dev/null 2>&1  # AC2: exit 0, usage text
          if [ -d "cn---help" ] || [ -n "$(ls -A /tmp/cn-init-smoke)" ]; then
            echo "FAIL: cn init --help scaffolded something"; ls -la /tmp/cn-init-smoke; exit 1
          fi
          cd - >/dev/null
          rm -rf /tmp/cn-init-smoke

          # F4 — cn help and cn status display names match real invocation
          # (space form, not the internal hyphenated registry key).
          HELP_OUT="$(./cn help)"
          echo "$HELP_OUT" | grep -q 'issues fsm'
          echo "$HELP_OUT" | grep -q 'cell finalize'
          if echo "$HELP_OUT" | grep -qE 'issues-fsm|cell-finalize|cell-return|cell-resume|repo-install|cdd-verify|issues-map'; then
            echo "FAIL: cn help leaked a non-invocable hyphenated name"; exit 1
          fi

          rm -rf /tmp/cn-status-smoke && mkdir -p /tmp/cn-status-smoke && cd /tmp/cn-status-smoke
          "$CN_BIN" init statushub >/dev/null
          cd cn-statushub
          STATUS_OUT="$("$CN_BIN" status)"
          if echo "$STATUS_OUT" | grep -qE 'issues-fsm|cell-finalize|cell-return|cell-resume|repo-install|cdd-verify|issues-map'; then
            echo "FAIL: cn status leaked a non-invocable hyphenated name"; echo "$STATUS_OUT"; exit 1
          fi
          cd - >/dev/null
          rm -rf /tmp/cn-status-smoke

          echo "PASS: cnos#612 F1-F4"

  binary-verify:
    name: Binary verification
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Build binary
        working-directory: src/go
        run: go build -o ../../cn ./cmd/cn

      - name: Configure git identity
        # `cn doctor` checks git user.name / user.email. GitHub runners
        # have no default identity — set one so the Tier 1 doctor kata
        # sees a clean config.
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@cnos.local"

      - name: Run Tier 1 verification
        run: |
          export PATH="$PWD:$PATH"
          scripts/kata/run-all.sh

  package-verify:
    name: Package verification
    runs-on: ubuntu-latest
    needs: [binary-verify]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Build binary
        working-directory: src/go
        run: go build -o ../../cn ./cmd/cn

      - name: Configure git identity
        # Tier 2 creates hubs via `cn init`; several sub-kata exercise
        # `cn doctor`, which requires a git user.name / user.email.
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@cnos.local"

      - name: Build packages
        run: |
          export PATH="$PWD:$PATH"
          cn build

      - name: Set up CI test hub (cnos.core + cnos.kata + cnos.cdd.kata)
        run: |
          export PATH="$PWD:$PATH"
          # Extract real versions from package source — the only authority
          # for what cn build just produced. Pre-#250 the lockfile dumped
          # the full index, so a stale/wrong manifest still "worked"; now
          # cn deps lock honors deps.json strictly, so the manifest must
          # name versions that actually exist in the index.
          version_of() {
            grep -m1 '"version"' "src/packages/$1/cn.package.json" \
              | sed -E 's/.*"version":[[:space:]]*"([^"]+)".*/\1/'
          }
          CORE_VER=$(version_of cnos.core)
          KATA_VER=$(version_of cnos.kata)
          CDDKATA_VER=$(version_of cnos.cdd.kata)
          mkdir -p ci-tier2
          cd ci-tier2
          cn init ci-hub >/dev/null
          cd cn-ci-hub
          cn setup >/dev/null
          cat > .cn/deps.json <<JSON
          {
            "schema": "cn.deps.v1",
            "profile": "engineer",
            "packages": [
              {"name": "cnos.core", "version": "$CORE_VER"},
              {"name": "cnos.kata", "version": "$KATA_VER"},
              {"name": "cnos.cdd.kata", "version": "$CDDKATA_VER"}
            ]
          }
          JSON
          cn deps lock
          cn deps restore

      - name: Run Tier 2 verification
        run: |
          export PATH="$PWD:$PATH"
          cd ci-tier2/cn-ci-hub
          cn kata run --class runtime

      - name: Framework command surface (kata-list, method dispatch, kata-judge)
        # Per #251 review F3: Tier-2 must mechanically protect every new
        # command surface against regression, not just `kata-run --class
        # runtime`. This step asserts cross-package discovery, method
        # dispatch with a corpus-only stub bundle, and judge output.
        run: |
          export PATH="$PWD:$PATH"
          cd ci-tier2/cn-ci-hub
          set -euo pipefail

          echo "--- cn kata list ---"
          LIST_OUT="$(cn kata list)"
          echo "$LIST_OUT"
          R_COUNT=$(echo "$LIST_OUT" | grep -cE '^\s+runtime\s+R[0-9]')
          M_COUNT=$(echo "$LIST_OUT" | grep -cE '^\s+method\s+M[0-9]')
          [ "$R_COUNT" -ge 4 ] || { echo "FAIL: kata-list found $R_COUNT runtime, expected >= 4"; exit 1; }
          [ "$M_COUNT" -ge 5 ] || { echo "FAIL: kata-list found $M_COUNT method, expected >= 5"; exit 1; }
          echo "PASS: kata-list discovered $R_COUNT runtime + $M_COUNT method across packages"

          echo "--- cn kata run M0-gap --mode cdd (corpus-only stub path) ---"
          cn kata run M0-gap --mode cdd
          BUNDLE="$(ls -td .kata-runs/*-M0-gap-cdd | head -1)"
          [ -n "$BUNDLE" ] && [ -f "$BUNDLE/metadata.json" ] \
            || { echo "FAIL: no run bundle produced"; exit 1; }
          grep -q '"status": "stub"' "$BUNDLE/metadata.json" \
            || { echo "FAIL: metadata.json missing 'status: stub'"; cat "$BUNDLE/metadata.json"; exit 1; }
          echo "PASS: method-kata stub path produced valid bundle ($BUNDLE)"

          echo "--- cn kata judge <bundle> ---"
          JUDGE_OUT="$(cn kata judge "$BUNDLE")"
          echo "$JUDGE_OUT"
          echo "$JUDGE_OUT" | grep -q '"verdict": "not-yet-implemented"' \
            || { echo "FAIL: kata-judge missing honest-stub verdict"; exit 1; }
          echo "PASS: kata-judge emitted honest-stub verdict"

  # --- Coherence checks (structural, not build-dependent) ---

  package-source-drift:
    name: Package/source drift (I1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Build cn binary
        working-directory: src/go
        run: go build -o ../../cn ./cmd/cn

      - name: Check package/source sync
        run: ./cn build --check

  protocol-contract-check:
    name: Protocol contract schema sync (I2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check contract copy matches source
        run: diff docs/reference/schemas/protocol-contract.json tests/fixtures/protocol-contract.json

  link-check:
    name: Repo link validation (I4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # lychee: Rust binary link checker, no runtime deps.
      # --offline: skip external URLs (check local file links only).
      # --hidden: explicitly include dotted dirs so the scan scope is
      #   deterministic across lychee versions; frozen evidence under .cdd/ is
      #   then scoped out via lychee.toml `exclude_path` (active-docs gate only).
      # --config lychee.toml: input scope (exclude_path) for frozen history +
      #   a small URL ignore list for frozen snapshots / intentional example
      #   placeholders. See lychee.toml; tracker: #300. Frozen .cdd / PRA link
      #   drift is audited separately and non-blocking (#523), not gated here.
      - name: Check repo links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --hidden --config lychee.toml '**/*.md'
          fail: true

  skill-frontmatter-check:
    name: SKILL.md frontmatter validation (I5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cue-lang/setup-cue: action tag pinned (#301 design constraint).
      # CUE version pinned for deterministic CI; bump only when the schema
      # is re-tested against the new release.
      - name: Setup CUE
        uses: cue-lang/setup-cue@v1.0.1
        with:
          version: v0.13.2

      - name: Schema self-test (positive + negative fixtures)
        run: ./scripts/ci/validate-skill-frontmatter.sh --self-test

      - name: Validate every SKILL.md frontmatter
        run: ./scripts/ci/validate-skill-frontmatter.sh

  cdd-artifact-check:
    name: CDD artifact ledger validation (I6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/go/go.sum

      - name: Build cn
        working-directory: src/go
        run: go build -o "$GITHUB_WORKSPACE/cn" ./cmd/cn

      # I6 is an in-flight CDD gate: it validates current (.cdd/unreleased/)
      # cycles, not frozen release history. The legacy `cn-cdd-verify` shell
      # script was removed in cnos#392 (V is now the `cn cdd verify`
      # subcommand); this step builds cn and invokes the canonical form.
      # `.cdd/exceptions.yml` carries narrow, issue-linked unreleased
      # exceptions only. Released CDD records under .cdd/releases/ are immutable
      # evidence and are audited separately, not gated here.
      - name: Check CDD artifacts (unreleased gate)
        run: ./cn cdd verify --unreleased --exceptions .cdd/exceptions.yml

      - name: Run test fixtures
        run: src/packages/cnos.cdd/commands/cdd-verify/test-fixtures.sh

  dispatch-repair-preflight:
    name: Dispatch repair-preflight guard (cnos#516)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cnos#516 regression guard: asserts the rendered dispatch surface
      # (protocol + cds-dispatch prompt + golden + live workflow) still carries
      # the repair re-entry preflight contract, so a re-claimed
      # status:changes -> status:todo cell cannot silently re-certify rejected
      # work (the Pass 4D / cnos#514 failure mode).
      - name: Check dispatch repair re-entry preflight contract
        run: ./scripts/ci/check-dispatch-repair-preflight.sh

  dispatch-closeout-integrity:
    name: Dispatch closeout-integrity guard (cnos#524)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cnos#524 W4 RCA regression guard: asserts the rendered dispatch surface
      # (protocol + cds-dispatch prompt + SKILL + golden + live workflow) carries
      # the closeout-integrity contract (deliverable proof before status:review).
      # The empty-review detector itself is proven live by the Go FSM test suite
      # (TestAC3_EmptyReviewBlocked et al.), not by a bash self-test inside this
      # script (cnos#600 consolidation). Prevents the W4 failure mode: a cell
      # setting status:review with no PR / no commits / no closeout.
      - name: Check dispatch closeout-integrity contract
        run: ./scripts/ci/check-dispatch-closeout-integrity.sh
