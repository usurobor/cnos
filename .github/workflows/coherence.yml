name: Coherence

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coherence-build-check:
    name: Package/source drift (I1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.x

      - name: Install dependencies
        run: |
          opam install dune ppx_expect ppxlib mdx --yes
        env:
          OPAMRETRIES: "3"

      - name: Build cn binary
        run: |
          eval $(opam env)
          dune build src/cli/cn.exe

      - name: Check package/source sync
        run: |
          eval $(opam env)
          ./_build/default/src/cli/cn.exe build --check

  protocol-contract-check:
    name: Protocol contract + traceability (I2/I3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.x

      - name: Install dependencies
        run: |
          opam install dune ppx_expect ppxlib mdx --yes
        env:
          OPAMRETRIES: "3"

      - name: Check contract copy matches source
        run: diff docs/alpha/schemas/protocol-contract.json test/cmd/protocol-contract.json

      - name: Run invariant tests
        run: |
          eval $(opam env)
          mkdir -p "$TMPDIR"
          dune runtest test/cmd -j 1
        env:
          TMPDIR: ${{ runner.temp }}/dune-tests

  notify:
    needs: [coherence-build-check, protocol-contract-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then exit 0; fi
          R1="${{ needs.coherence-build-check.result }}"
          R2="${{ needs.protocol-contract-check.result }}"
          STATUS="success"; ([ "$R1" != "success" ] || [ "$R2" != "success" ]) && STATUS="failure"
          ICON="✅"; [ "$STATUS" != "success" ] && ICON="❌"
          REF="${{ github.head_ref || github.ref_name }}"
          MSG="$ICON Coherence $STATUS: ${{ github.repository }}@${REF}"
          [ -n "${{ github.event.pull_request.number }}" ] && MSG="$MSG (PR #${{ github.event.pull_request.number }})"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" -d text="${MSG}" -d disable_notification=true
