# placeholder demonstration to an end-to-end V-validatable receipt.
#
# Covers AC3 and AC5 of #388, plus AC6 (evidence-ref dereferenceability)
# of #389.
# Expected: `cue vet -c -d '#CDSReceipt' schemas/cdd/contract.cue schemas/cdd/boundary_decision.cue schemas/cdd/receipt.cue schemas/cds/receipt.cue schemas/cds/fixtures/valid-receipt.yaml` exits 0.
# Expected: `cn-cdd-verify --receipt schemas/cds/fixtures/valid-receipt.yaml` exits 0 (PASS).

