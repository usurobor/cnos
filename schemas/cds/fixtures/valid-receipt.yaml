# receipt. This fixture moved here from schemas/cdd/fixtures/ as part of
# cycle/388's Phase 2.5 split: the receipt shape this fixture exemplifies
# is the CDS protocol overlay's required-fields set, not the generic
# kernel's.
#
# Originally cycle/369's Phase 2 valid fixture for the (then-unified)
# #Receipt; under the cycle/388 split it validates against #CDSReceipt
