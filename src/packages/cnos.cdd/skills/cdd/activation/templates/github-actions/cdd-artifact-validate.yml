# cdd-artifact-validate.yml — CDD artifact presence validator
#
# Drop this file into .github/workflows/ in your tenant repository.
#
# What it does:
#   On every push to cycle/* branches, runs the pre-merge phase of
#   scripts/validate-release-gate.sh. Post-merge closure is a separate exact-cycle
#   invocation; release is a separate pre-tag invocation.
#   Fails with a named error message if the script is missing or if artifacts are absent.
#
# Customize:
#   - VALIDATE_MODE: use "post-merge" with --cycle N for closure, or "release"
#     for pre-tag gate runs (default here: "pre-merge")
#   - No other edits needed; secret names use the canonical CDD_ namespace.
#
# Reference: cdd/activation/SKILL.md §9 Layer 1

name: CDD Artifact Validate

on:
  push:
    branches:
      - 'cycle/**'

jobs:
  artifact-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check validate-release-gate.sh exists
        run: |
          if [[ ! -f "scripts/validate-release-gate.sh" ]]; then
            echo "ERROR: validate-release-gate.sh not found at scripts/validate-release-gate.sh" >&2
            echo "Add scripts/validate-release-gate.sh to your repository." >&2
            echo "Reference implementation: cnos scripts/validate-release-gate.sh" >&2
            exit 1
          fi
          echo "scripts/validate-release-gate.sh found"

      - name: Validate CDD artifact presence
        # Cycle branches use pre-merge. A closure workflow should invoke
        # post-merge with --cycle N; pre-tag checks use release.
        env:
          VALIDATE_MODE: pre-merge
        run: |
          CYCLE_NUMBER="${GITHUB_REF_NAME#cycle/}"
          if [[ ! "$CYCLE_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: non-numeric cycle branch: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          bash scripts/validate-release-gate.sh \
            --mode "$VALIDATE_MODE" --cycle "$CYCLE_NUMBER"
