# WC-2 — The Coherence-Measurement (CM) contract  [KEYSTONE ROOT]
# Repairs external-β BLOCKER-1 (CM-ownership) and finding L1-A1 (kernel ordering).
# CM is the runner/provider-produced measurement object; it is NOT a cell's telos and
# NOT the CC's judgment. Root of the wave: only external inputs, no sibling_output refs.
schema: cn.cell.contract.v1
cell:
  id: "wc-2"
  class: "working"                 # WC — its output is a repo doctrine artifact (per the settled telos rule)
  mode: "doctrine"                 # spec-authoring WC mode
  protocol: "cds"
  matter_domain: "doctrine"
scope:
  repo: "usurobor/cnos"
  wave: "671"
  parent_cell: "671"
intent_ref:
  schema: "cn.intent.v1"
  id: "intent-2026-0719-671-cell-runtime-doctrine"        # the intent IDENTITY; resolves to the transitional bootstrap intent projection (identity != carrier)
  carrier:
    kind: "repo_artifact_bootstrap"                       # PROJECTION POINTER to the transitional bootstrap intent snapshot; NOT the identity-authoring mechanism (identity is intent_ref.id). §2 carrier {kind, ref} shape preserved.
    ref: "sha256:1e246846774c43365cb00dc1b39b6998bab535f4833a16fcfe32ca3e2825560e@.cdd/waves/cell-runtime-doctrine/intent.cn-intent-v1.yaml"
