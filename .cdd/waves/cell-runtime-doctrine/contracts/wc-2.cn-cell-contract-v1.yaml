    - "d9_four_schema_boundary_settled__cm_is_realized_within_the_authorized_four_schemas_not_as_a_fifth_canonical_cn_cm_v1__operator_settled_no_authorized_reopening"
    - "cm_realized_within_four_schemas__a_typed_cm_field_or_edge_in_the_receipt_plus_a_cm_ref_resolving_within_the_existing_four_schemas__wc1_and_wc4_consume_this_same_cm_ref_shape"
    - "negative_fixture_reject_fifth_canonical_schema__a_proposed_fifth_cn_cm_v1_canonical_schema_is_rejected_while_the_four_schema_boundary_remains_settled"
    - "reproducible__same_frozen_inputs_plus_provider_version_reproduce_the_mechanically_claimed_cm_result"
    - "cm_ref_field_shape_is_the_single_interface_all_other_nodes_import__no_second_cm_shape_introduced_downstream"
    - "emits_machine_readable_acceptance_fixtures_into_receipt__cm_object_json__cc_judgment_json__receipt_core_json__final_receipt_json__reject_fifth_schema_json__each_validated_by_the_named_acceptance_oracle_command"
    - "mechanical_oracles_owned__every_mechanically_verifiable_predicate_binds_a_concrete_checker_or_schema_path_no_placeholder_operand_positive_fixture_exit_0_and_named_negative_fixture_exit_nonzero_within_allowed_paths_or_a_pinned_immutable_input_and_bound_in_the_receipt"
constraints:
  allowed_paths:
    - "docs/architecture/COHERENCE-MEASUREMENT.md"
    - ".cdd/unreleased/wc-2/**"
    - ".cdd/unreleased/wc-2/fixtures/**"     # machine-readable acceptance fixtures/tables its V needs (finding-3)
  forbidden_paths:
    - "schemas/**"                 # implementing CM *fields* in CUE is #627 S2; building the CM *engine* is S3
    - "src/**"
    - ".github/workflows/**"
    - "docs/architecture/CELL-RUNTIME-CLASSES.md"   # WC-1's surface
  non_goals:
    - "implement_the_cm_engine__that_is_627_S3"
    - "extend_the_shipped_cue_schemas__that_is_627_S2"
    - "build_or_modify_usurobor_tsc"
    - "author_the_cell_or_wave_fsm"
    - "make_cc_the_universal_measurement_producer"
    - "file_or_dispatch_child_issues"
gates:
  operator_authorization_required: false     # pre-authorized at the wave boundary (§9), not per-child
  operator_acceptance_required: true         # doctrine_affecting ⇒ acceptance required (gate invariant 1)
  reason: "doctrine-affecting CM backbone; operator final-read required at merge"
doctrine_affecting: true
stop_conditions:
