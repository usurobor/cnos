# different state spaces). Closes L3-A1/B1 (cell lifecycle authority split).
# Depends on WC-1 (typed contract) + WC-2 (CM, for V-gating).
schema: cn.cell.contract.v1
cell:
  id: "wc-3a"
  class: "working"
  mode: "doctrine"
  protocol: "cds"
  matter_domain: "doctrine"
scope:
  repo: "usurobor/cnos"
  wave: "671"
  parent_cell: "671"
intent_ref:
