        commit: "6e40d93497589afd96e6c891e94851cdabe2ef3a"
        path: "src/packages/cnos.cds/skills/cds/fsm/transitions.json"
    - ref_kind: "external"          # CCNF (repair-dispatch recursion mode, role firebreak)
      locator:
        kind: "repo_artifact"
        repo: "usurobor/cnos"
        commit: "6e40d93497589afd96e6c891e94851cdabe2ef3a"
        path: "src/packages/cnos.cdd/skills/cdd/COHERENCE-CELL-NORMAL-FORM.md"
    - ref_kind: "external"          # grounding CM (content-bound) — L3-A1/B1 finding this node closes
      locator:
        kind: "control_plane"
        ref: "cnos#667#issuecomment-5015460988"
        revision: "sha256:9d1ab3a50d00e642fdeb87728dd71f7c7499c60878afe7001f2ddb832b161dbb@.cdd/waves/cell-runtime-doctrine/grounding-source-5015460988.md"
