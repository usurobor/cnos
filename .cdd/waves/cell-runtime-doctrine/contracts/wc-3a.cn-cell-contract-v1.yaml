    - ref_kind: "sibling_output"
      producer: "wc-1"
      output_id: "cell-classes-and-contract"       # cell.class/guards + the typed contract the FSM reads
    - ref_kind: "sibling_output"
      producer: "wc-2"
      output_id: "coherence-measurement-contract"  # V-gating on cm_ref at the review/close edges
  optional: []
requested_output:
  id: "cell-fsm"
  kind: "artifact"
  path: "docs/architecture/CELL-FSM.md"
acceptance:
  predicates:
    - "cell_fsm_state_set_closed_and_declared__blocked_is_a_declared_member_not_only_a_transition_target"
    - "exactly_one_authority_per_edge__reconciles_transitions_json_and_cn_issues_dispatch_and_cn_cell_resume_and_spec"
    - "total_event_guard_action_relation__every_nonterminal_state_has_owned_exits"
    - "invalid_transition_semantics_defined"
    - "deterministic_or_normatively_prioritized_transition_selection__same_bundle_hash_same_decision"
    - "review_return_conflict_resolved__the_11_1_changes_to_todo_vs_11_2_changes_to_in_progress_ambiguity_settled_to_one_edge"
    - "cc_disposition_to_cell_transition_request_adapter__cc_selects_a_judgment_the_fsm_validates_and_effects_the_transition__cc_never_mutates_state_directly"
    - "command_table_parity__cn_cell_and_cn_issues_surfaces_map_onto_declared_table_edges"
    - "request_marker_pattern_pinned__typed_marker_plus_evidentiary_guards"
    - "reachability_proved__every_declared_state_reachable_from_the_initial_state"
constraints:
  allowed_paths:
    - "docs/architecture/CELL-FSM.md"
    - ".cdd/unreleased/wc-3a/**"
  forbidden_paths:
    - "schemas/**"
    - "src/**"                       # editing transitions.json / Go is #627 S4–S7 implementation
    - ".github/workflows/**"
    - "docs/architecture/WAVE-FSM.md"   # WC-3b's surface
  non_goals:
    - "author_the_wave_fsm__that_is_wc3b"
    - "implement_the_fsm_in_go_or_edit_transitions_json"
    - "own_cm_internals_or_the_contract_envelope"
    - "file_or_dispatch_child_issues"
gates:
  operator_authorization_required: false
  operator_acceptance_required: true
  reason: "doctrine-affecting cell-lifecycle FSM; operator final-read required at merge"
doctrine_affecting: true
stop_conditions:
  - "source_doctrine_conflicts"
  - "predecessor_output_unavailable"           # WC-1 or WC-2 output absent
  - "review_return_authority_unresolvable"
