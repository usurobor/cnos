# The objective, as the operator directed it (operator matter only; NO α planning conclusions here).
statement: >-
  Bootstrap a three-cell agent — Working / Planning / Cohering — over the one CCNF kernel, so the
  system keeps itself coherent while bounded tasks unfold, instead of a wave advancing only on human
  prompting between cells. The missing layer is a generic cell runner plus a Cohering Cell that keeps
  planner intent, worker outputs, issue/PR/label/release state, and operator gates describing one
  system over time. The operator's final doctrine line governs: the Planner Cell defines the intended
  relation, the Worker Cell produces local matter, the Coherence Cell preserves process identity, the
  Generic Cell Runner mechanically moves inputs/outputs/receipts/coherence-measurements between them,
  and cognition is delegated only after mechanical coherence measurement shows the next pulse is not
  mechanically determined. This Planning Cell's charter is the doctrine/design layer that FEEDS #627's
  implementation: settle the cell-runtime doctrine as a coherent, mechanically-checkable specification,
  grounded in an immutable coherence measurement, so a Working Cell can implement the runtime (Go/CUE)
  without inventing dependency, measurement, authority, or gate policy.
scope:
  repo: "usurobor/cnos"
  wave: "671"
  parent_wave: "627"
  in_scope:                          # operator-authorized doctrine surfaces (#627 S1 + this cell's charter)
    - "the typed cell contract envelope and its input/edge/gate model (doctrine only)"
    - "the coherence-measurement backbone that V gates on (CM measures; V gates; δ effects)"
    - "the cell lifecycle and the wave lifecycle as distinct state machines"
    - "the shipped→specified contract migration as a doctrine/schema-boundary design"
  out_of_scope:
    - "implementing the CM engine, CUE schemas, or Go runtime (that is #627 S2–S8)"
    - "reopening the D9 four-schema boundary to a fifth canonical schema (operator-settled)"
    - "forking or replacing #627 as the single implementation authority"
    - "any control-plane action (filing / dispatching / commenting / merging)"
constraints:                          # operator / settled-doctrine constraints only
  - "grounding must be an immutable, content-bound measurement (source SHA-256 + retrievable snapshot)"
  - "CM is a runner/provider-produced object; a CC output is a JUDGMENT that consumes CM refs; the two are distinct tagged objects (settled S1 doctrine, #627)"
  - "the D9 four-schema boundary stays settled by operator decision; no authorized reopening at wave scope"
  - "operator authorization binds once at the wave boundary, to the exact authorized wave revision (§9)"
  - "every doctrine-affecting child requires operator acceptance at merge (gate invariant 1, §2)"
desired_outcome: >-
  A coherent, mechanically-checkable specification of the cnos cell-runtime doctrine under
  docs/architecture/, such that #627's S2–S8 implementation Working Cells can build the runtime
  without inventing dependency, measurement, authority, or gate policy — the operator's "a wave
  advances itself, asking a human only when the move is genuinely non-deterministic or a gate
  requires it" made specifiable. The concrete decomposition that delivers this outcome (the node set,
  the edges, the completion predicate, the integration seal) is α PLANNING matter recorded in
  decision-provenance.md, NOT operator intent.
