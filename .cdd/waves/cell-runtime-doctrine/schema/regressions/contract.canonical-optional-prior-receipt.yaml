# CANONICAL VARIANT (must PASS #CellContract) — an OPTIONAL external prior_receipt locator, plus a
# prior_receipt in required. Exercises the prior_receipt locator class and inputs.optional (external-only).
schema: cn.cell.contract.v1
cell:
  id: "canonical-prior-receipt"
  class: "working"
  mode: "doctrine"
  protocol: "cds"
  matter_domain: "doctrine"
scope:
  repo: "usurobor/cnos"
  wave: "671"
  parent_cell: "671"
intent_ref:
  schema: "cn.intent.v1"
  id: "intent-canonical"
  carrier:
    kind: "github_issue"
    ref: "cnos#671"
inputs:
  required:
    - ref_kind: "external"
      locator:
        kind: "prior_receipt"          # prior_receipt class in required
        receipt: "receipt-2026-0718-670-seal"
        binding: "sha256:aaaa1111bbbb2222cccc3333dddd4444eeee5555ffff6666aaaa7777bbbb8888"
    - ref_kind: "sibling_output"
      producer: "wc-2"
      output_id: "coherence-measurement-contract"
  optional:
    - ref_kind: "external"             # optional prior_receipt (external-only, immutable, edge-free)
      locator:
        kind: "prior_receipt"
        receipt: "receipt-2026-0717-669-advisory"
        binding: "sha256:1111aaaa2222bbbb3333cccc4444dddd5555eeee6666ffff7777aaaa8888bbbb"
requested_output:
  id: "canonical-artifact"
  kind: "artifact"
  path: "docs/architecture/X.md"
acceptance:
  predicates:
    - "consumes_a_prior_receipt_as_optional_immutable_evidence"
constraints:
  allowed_paths:
    - "docs/architecture/X.md"
  forbidden_paths:
    - "schemas/**"
  non_goals:
    - "some_non_goal"
gates:
  operator_authorization_required: false
  operator_acceptance_required: true
  reason: "doctrine-affecting; operator acceptance required at merge"
doctrine_affecting: true
stop_conditions: []
