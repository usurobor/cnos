# contract_ref resolution is revision-bound: operator authorization binds to THIS EXACT wave revision.
contract_ref_resolution:
  rule: >-
    Every node.contract_ref is a repo-relative path resolved RELATIVE TO THE IMMUTABLE AUTHORIZED
    WAVE COMMIT — the exact git tree the operator authorizes. Resolution is the pair
    (authorized_wave_commit, contract_ref). Operator authorization is revision-bound, not path-bound:
    re-resolving any contract_ref against a changed tree (a different blob at the path) MUST FAIL
    STALE and re-enter the wave-authorization gate. A changed contract is a new, unauthorized wave.
  authorized_wave_commit: "tip of wave/671-cell-runtime-doctrine at operator authorization (bound by κ at the wave boundary)"
  per_child_content_binding: >-
    Each node additionally carries node.contract_sha256 — the SHA-256 of the contract blob at the
    authorized commit — so resolution is independently content-addressable and validate.py check (b)
    can prove every contract_ref resolves to its pinned bytes.
  stale_on: "any contract_ref path resolving to a different blob (different SHA-256) than at the authorized commit"

