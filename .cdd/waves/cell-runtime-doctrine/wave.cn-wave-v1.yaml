      note: "true source SHA-256; 150-line comment body; the authoritative grounding measurement"
  alpha_derivative:                # α's derived FAIL-classification (REFERENCES the snapshot; NOT the exact bytes)
    ref_kind: "external"
    locator:
      kind: "repo_artifact"
      repo: "usurobor/cnos"
      resolved_at: "authorized_wave_commit"
      path: ".cdd/waves/cell-runtime-doctrine/grounding-cm.md"
      content_hash: "sha256:d6ce02d99518a6df6e1995ac425719490c934f84b4745401cd24a823202e379e"
      references_source: "sha256:9d1ab3a50d00e642fdeb87728dd71f7c7499c60878afe7001f2ddb832b161dbb"
  reconcile_627_ref:
    ref_kind: "external"
    locator:
      kind: "repo_artifact"
      repo: "usurobor/cnos"
      resolved_at: "authorized_wave_commit"
