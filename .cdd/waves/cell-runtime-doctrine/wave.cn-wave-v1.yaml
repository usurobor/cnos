# cn.wave.v1 — CM-grounded cell-runtime doctrine decomposition (cnos#671 R8)
#
# Every node carries a complete cn.cell.contract.v1 (by contract_ref to the files under contracts/,
# resolved at the immutable authorized wave commit; see contract_ref_resolution). Edges are the
# MECHANICAL PROJECTION of the child contracts' sibling_output refs: an edge A→B exists iff B's
# contract carries a sibling_output ref whose producer+output_id resolves to A's requested_output.id.
# `external` refs (incl. the grounding CM and #628/S1) create NO edge. Edges here are authored for
# readability; exact parity with the derived set is a DEFERRED-GO check (WC-3b/WC-5; see schema/README.md).
#
# STRUCTURAL pre-authorization validation of THIS file is `cue vet ./schema/ ./wave.cn-wave-v1.yaml
# -d '#Wave'` (Go+CUE repo — no Python). The closed #Wave definition natively rejects the R7
# wave-envelope + completion blockers (unknown/mutated top-level key, empty external_roots, missing
# revision-bound authorization fields, empty contract_ref_resolution, a deleted/flipped edge_derivation
# constant, a deleted/literal-mutated completion formula, a record missing evidence_bound, a bool given
# as a string, a duplicate node/edge). PROCEDURAL checks (DAG acyclicity, edge parity, ref/hash
# resolution, completion-evidence derivation) are named-and-deferred to the Go validators WC-1/WC-3b
# and #627 S2–S3 ship.
schema: cn.wave.v1
wave: "671"
# wave-revision: R8
revision: "R8"
goal: >-
  A coherent, mechanically-checkable specification of the cnos cell-runtime doctrine — the typed
  cell contract, the CM measurement backbone, the cell/wave FSMs, and the shipped→specified
  migration — decomposed so each artifact is single-purpose and individually coherent, grounded in
  an immutable coherence measurement, such that a Working Cell can implement the runtime (Go/CUE)
  from these artifacts without inventing dependency, measurement, authority, or gate policy.

