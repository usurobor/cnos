# Edges derived over sibling_output refs only (kind: depends_on). Accepted graph shape (β): unchanged.
edges:
  - { from: "wc-2",  to: "wc-1",  kind: "depends_on" }   # wc-1  ← sibling_output(wc-2, coherence-measurement-contract)
  - { from: "wc-1",  to: "wc-3a", kind: "depends_on" }   # wc-3a ← sibling_output(wc-1, cell-classes-and-contract)
  - { from: "wc-2",  to: "wc-3a", kind: "depends_on" }   # wc-3a ← sibling_output(wc-2, coherence-measurement-contract)
  - { from: "wc-1",  to: "wc-3b", kind: "depends_on" }   # wc-3b ← sibling_output(wc-1, cell-classes-and-contract)
  - { from: "wc-2",  to: "wc-3b", kind: "depends_on" }   # wc-3b ← sibling_output(wc-2, coherence-measurement-contract)
  - { from: "wc-1",  to: "wc-4",  kind: "depends_on" }   # wc-4  ← sibling_output(wc-1, cell-classes-and-contract)
  - { from: "wc-2",  to: "wc-4",  kind: "depends_on" }   # wc-4  ← sibling_output(wc-2, coherence-measurement-contract)
  - { from: "wc-1",  to: "wc-5",  kind: "depends_on" }   # wc-5  ← sibling_output(wc-1, cell-classes-and-contract)
  - { from: "wc-2",  to: "wc-5",  kind: "depends_on" }   # wc-5  ← sibling_output(wc-2, coherence-measurement-contract)
  - { from: "wc-3a", to: "wc-5",  kind: "depends_on" }   # wc-5  ← sibling_output(wc-3a, cell-fsm)
  - { from: "wc-3b", to: "wc-5",  kind: "depends_on" }   # wc-5  ← sibling_output(wc-3b, wave-fsm)
  - { from: "wc-4",  to: "wc-5",  kind: "depends_on" }   # wc-5  ← sibling_output(wc-4, contract-migration)

edge_derivation:
  rule: "edge A→B iff B's cn.cell.contract.v1 carries a sibling_output ref resolving producer=A + output_id=A.requested_output.id"
  external_refs_create_no_edge: true
  parity_required: true            # authored edge set must equal the derived set exactly (DEFERRED-GO edge-parity validator)
  acyclic: true
  roots: [ "wc-2" ]                # sole keystone root; all cm_ref fields import from wc-2's stable output
  critical_path: [ "wc-2", "wc-1", "wc-3b", "wc-5" ]

gates:
  wave_authorization:
    authority: "operator"
    boundary: "once at the wave boundary (§9); children then scheduled by dependencies, no per-child operator gate"
    revision_bound: "binds to the authorized wave commit (see contract_ref_resolution); a changed tree fails stale"
  per_child:
    operator_authorization_required: false
    operator_acceptance_required: true        # every child is doctrine_affecting: true
    reason: "doctrine-affecting children require operator acceptance at merge (gate invariant 1)"

# Wave-level STOP conditions — each produces exactly one typed non-dispatch transition + receipt.
# effect ∈ {hold, replan, escalate}. None dispatches a child; each writes a typed stop receipt.
stop_conditions:
  - trigger: "stale_grounding"
    detect: "grounding source_snapshot no longer resolves to sha256:9d1ab3a5… (or the derivative/reconcile content_hash mismatches)"
    effect: "hold"
    transition: "dispatchable|executing → holding"
    receipt: "stop-receipt{type: stale_grounding, node: wave, evidence: expected_vs_actual_hash}"
  - trigger: "failed_predecessor"
    detect: "a predecessor node's completion predicate is FAIL / its receipt is absent when a successor becomes ready"
    effect: "hold"
    transition: "executing → holding"
    receipt: "stop-receipt{type: failed_predecessor, node: <successor>, evidence: missing_or_failed_producer}"
  - trigger: "invalid_graph"
    detect: "edge parity break OR a cycle appears (the DEFERRED-GO parity/DAG validator would FAIL)"
    effect: "replan"
    transition: "executing → replanning"
    receipt: "stop-receipt{type: invalid_graph, node: wave, evidence: parity_diff_or_cycle}"
  - trigger: "revoked_authorization"
    detect: "operator authorization for THIS wave revision is revoked, or contract_ref re-resolves stale at a changed tree"
    effect: "escalate"
    transition: "any → holding (awaiting re-authorization)"
    receipt: "stop-receipt{type: revoked_authorization, node: wave, evidence: authorized_commit_vs_current_tree}"
  - trigger: "integration_conflict"
    detect: "WC-5 seal detects a cross-artifact conflict (conflicting cm_ref / FSM state / schema field / missing adapter case / unmapped 627 node)"
    effect: "hold"
    transition: "completing → holding"
    receipt: "stop-receipt{type: integration_conflict, node: wc-5, evidence: conflicting_node_named}"
  - trigger: "unresolved_d9_at_wave_scope"
    detect: "a proposal to realize CM as a fifth canonical schema surfaces at wave scope (D9 four-schema boundary is settled)"
    effect: "escalate"
    transition: "any → holding (operator decision required to reopen a settled boundary)"
    receipt: "stop-receipt{type: unresolved_d9_at_wave_scope, node: wave, evidence: fifth_schema_proposal}"

# Non-recursive whole-wave completion (BLOCKER-1/2 repair).
#
# STRUCTURE (enforced NOW by `cue vet` against #Wave, R8):
#   * `wave_complete` is a FIXED required governing-formula const (all(N) AND terminal) — a deleted or
#     literal-mutated formula is rejected natively (required + pinned value), not by a validator;
#   * each fixture's per-node `records` value is a CLOSED 5-bool struct #ChildRecord — every constituent
#     {requested_output_produced, acceptance_all_pass, class_v_pass, receipt_bound, evidence_bound} is
#     required and typed bool, so a record MISSING evidence_bound, or a bool given as the string "false"
#     (e.g. receipt_bound: "false"), is rejected by the schema.
#
# DERIVATION (named-and-deferred to Go — WC-3b/WC-5, #627 S2–S3): that child_complete(n) is the AND over
# node n's OWN bound constituent record; that wc5_ready/wc5_complete/wave_complete are DERIVED from those
# records; that the predicate dependency graph (walked from the `expr` ASTs) is acyclic (a tautology
# `wave_complete := wave_complete` -> self-cycle -> FAIL); and that each fixture's computed value equals
# its authored `expected`. These are procedural evaluations CUE does not express; the Go completion-
# evidence validator (WC-3b/WC-5) computes them when the wave executes. The predicate/fixture data below
# is the authored input to that validator (structurally typed by #Wave: predicates[].{name,expr};
# fixtures[].{records,claimed_child_complete,expected}).
#
# Predicate AST grammar (input to the deferred-Go evaluator, over a fixture's per-node `records`):
#   {child_complete: "<n>"}         -> DERIVE child_complete(n) from records[n] via the definition below
#   {all_over_N: "child_complete"}  -> AND of derived child_complete(n) for n in construction_set_N
#   {pred: "<name>"}                -> evaluate predicate <name> (adds edge self -> <name>)
#   {and: [expr, ...]}  {or: [expr, ...]}  {not: expr}  {lit: true|false}
# child_complete.definition AST (evaluated over a node's record): {record: "<field>"} | {all|any|not} | {lit}
completion:
  construction_set_N: [ "wc-1", "wc-2", "wc-3a", "wc-3b", "wc-4" ]   # NON-recursive: excludes wc-5
  terminal_node: "wc-5"
  # PINNED governing formula (const; #Wave requires this exact string). NON-recursive: all(N) AND terminal.
  wave_complete: "all(N child_complete) AND child_complete(terminal)"
  note: "four/six child closures do NOT by themselves prove the objective — wave_complete = all(N) AND wc5_complete."

  # child_complete(n) DERIVATION — the AND over node n's OWN constituent record. Defined for n in
  # N ∪ {wc-5}. It never reads the wave predicate. The definition MUST read every required constituent;
  # a definition that ignores output/acceptance/V/receipt (a naked-`true` equivalent) FAILS check (g).
  child_complete:
    kind: "derived-per-node-predicate"
    required_constituents:
      - "requested_output_produced"     # node n's requested_output was produced (content identity bound)
      - "acceptance_all_pass"           # every acceptance.predicate / oracle result for n is PASS
      - "class_v_pass"                  # class-WC V verdict for n is PASS (gates on the imported CM ref)
      - "receipt_bound"                 # a receipt for n is bound by identity/hash
    definition:
      all:
        - { record: "requested_output_produced" }
        - { record: "acceptance_all_pass" }
        - { record: "class_v_pass" }
        - { record: "receipt_bound" }
        - { record: "evidence_bound" }   # content-bound β/γ evidence present where required

  # Named predicates, each with an evaluatable `expr`. The dependency graph is DERIVED from these ASTs.
  predicates:
    - name: "wc5_ready"
      # seal readiness: every child in N has completed. Quantifies over N only; never over wc-5 or the wave.
      expr: { all_over_N: "child_complete" }
    - name: "wc5_complete"
      # wc-5's OWN completion: DERIVED from wc-5's own constituent record. Reads nothing recursive.
      expr: { child_complete: "wc-5" }
    - name: "wave_complete"
      # the ONLY predicate over both N and wc-5; nothing reads it back.
      expr:
        and:
          - { all_over_N: "child_complete" }
          - { pred: "wc5_complete" }

  # Fixtures: per-node constituent `records` + an optional `claimed_child_complete` (which MUST agree
  # with the constituent-derived value) + AUTHORED `expected`. The DEFERRED-GO completion-evidence
  # validator derives child_complete(n) from each record, computes every predicate, and asserts it
  # equals `expected` (reject on mismatch). #Wave (cue vet) fixes the SHAPE of records/expected now.
  fixtures:
    - name: "all-incomplete"
      note: "no node's constituents hold; wc-5 not complete"
      records:
        wc-1:  { requested_output_produced: false, acceptance_all_pass: false, class_v_pass: false, receipt_bound: false, evidence_bound: false }  # all-incomplete wc-1
        wc-2:  { requested_output_produced: false, acceptance_all_pass: false, class_v_pass: false, receipt_bound: false, evidence_bound: false }  # all-incomplete wc-2
        wc-3a: { requested_output_produced: false, acceptance_all_pass: false, class_v_pass: false, receipt_bound: false, evidence_bound: false }  # all-incomplete wc-3a
        wc-3b: { requested_output_produced: false, acceptance_all_pass: false, class_v_pass: false, receipt_bound: false, evidence_bound: false }  # all-incomplete wc-3b
        wc-4:  { requested_output_produced: false, acceptance_all_pass: false, class_v_pass: false, receipt_bound: false, evidence_bound: false }  # all-incomplete wc-4
        wc-5:  { requested_output_produced: false, acceptance_all_pass: false, class_v_pass: false, receipt_bound: false, evidence_bound: false }  # all-incomplete wc-5
      claimed_child_complete: { "wc-1": false, "wc-2": false, "wc-3a": false, "wc-3b": false, "wc-4": false, "wc-5": false }
      expected: { wc5_ready: false, wc5_complete: false, wave_complete: false }
    - name: "all-N-complete__WC-5-absent"
      note: "every node in N satisfies output+acceptance+V+receipt(+evidence); wc-5 produced no receipt (seal ready, wave incomplete)"
      records:
        wc-1:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # N-complete wc-1
        wc-2:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # N-complete wc-2
        wc-3a: { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # N-complete wc-3a
        wc-3b: { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # N-complete wc-3b
        wc-4:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # N-complete wc-4
        wc-5:  { requested_output_produced: false, acceptance_all_pass: false, class_v_pass: false, receipt_bound: false, evidence_bound: false }  # N-complete wc-5
      claimed_child_complete: { "wc-1": true, "wc-2": true, "wc-3a": true, "wc-3b": true, "wc-4": true, "wc-5": false }
      expected: { wc5_ready: true, wc5_complete: false, wave_complete: false }
    - name: "WC-5-V-FAIL"
      note: "every child in N complete; wc-5 produced output + receipt but its class-V verdict FAILED (seal ready, wave incomplete)"
      records:
        wc-1:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # V-fail wc-1
        wc-2:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # V-fail wc-2
        wc-3a: { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # V-fail wc-3a
        wc-3b: { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # V-fail wc-3b
        wc-4:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # V-fail wc-4
        wc-5:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: false, receipt_bound: true, evidence_bound: true }  # V-fail wc-5
      claimed_child_complete: { "wc-1": true, "wc-2": true, "wc-3a": true, "wc-3b": true, "wc-4": true, "wc-5": false }
      expected: { wc5_ready: true, wc5_complete: false, wave_complete: false }
    - name: "all-complete__wave-complete"
      note: "every node's constituents hold and wc-5 seals — the wave completes"
      records:
        wc-1:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # all-complete wc-1
        wc-2:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # all-complete wc-2
        wc-3a: { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # all-complete wc-3a
        wc-3b: { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # all-complete wc-3b
        wc-4:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # all-complete wc-4
        wc-5:  { requested_output_produced: true, acceptance_all_pass: true, class_v_pass: true, receipt_bound: true, evidence_bound: true }  # all-complete wc-5
      claimed_child_complete: { "wc-1": true, "wc-2": true, "wc-3a": true, "wc-3b": true, "wc-4": true, "wc-5": true }
      expected: { wc5_ready: true, wc5_complete: true, wave_complete: true }
