# predicates (registry ⇄ each child's acceptance ⇄ the md projection): every mechanically-verifiable
# predicate maps to exactly one child owner entry, and every registry owner entry maps to exactly one
# child acceptance predicate. Removing any one entry (while its acceptance predicate + md row survive),
# duplicating an entry under another owner, reclassifying an entry, leaving a predicate unowned, or
# adding an owner entry absent from the contract's acceptance — each fails check (h) for its own reason.
