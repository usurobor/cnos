# key and moves ALL oracle ownership here, into a separate content-bound registry that each child
# contract CONSUMES via a canonical `inputs.required[].external` control_plane ref (immutable
# locator + content hash) — exactly the mechanism the wave already uses for reconcile-627.md. The child
# contract's scalar `acceptance.predicates` require this registry's outputs/evidence for that child; no
# non-canonical field is added to any contract.
#
# THIS registry is AUTHORITATIVE. `acceptance-oracles.md` is a human-readable PROJECTION of it, and
